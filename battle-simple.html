          battleEnvironment = 'fragrant';
          battleEnvironmentTurns = 4;
          playerUnits.forEach(unit => {
            if (unit.currentHp <= 0) return;
            unit.fragrantBloom = true;
            unit.fragrantBloomTurns = 4;
          });
          addLog(`${caster.name} 使用 ${skill.name}，召唤芬芳环境！（持续4回合：己方草系技能伤害+25%，每回合回复5%HP）`, 'buff');
        }

        // ==================== 水系全体队友效果 ====================
        // 水疗之术：群体治疗+流水状态
        if (skill.healPercent && skill.healPercent > 0) {
          playerUnits.forEach(unit => {
            if (unit.currentHp <= 0) return;
            const heal = Math.floor(unit.maxHp * skill.healPercent);
            unit.currentHp = Math.min(unit.maxHp, unit.currentHp + heal);
            showDamageNumber(unit.id, heal, 'heal');
            updateHpBar(unit);
          });
          addLog(`${caster.name} 使用 ${skill.name}，为全体恢复 ${Math.round(skill.healPercent * 100)}% HP`);

          // 流水效果（速度+1级）
          if (skill.flowEffect) {
            playerUnits.forEach(unit => {
              if (unit.currentHp <= 0) return;
              unit.buffs = unit.buffs || [];
              unit.buffs.push({
                type: 'flow',
                speedBoost: 1,
                remainingDuration: 2
              });
            });
            addLog(`全体获得「流水」状态！（速度+1级，持续2回合）`, 'buff');
          }
        }
      }

      // ==================== 水系天气效果 ====================
      // 雨天效果（雨天：所有生物水属性技能威力+50%）
      if (skill.rainyDayEffect) {
        // 设置全局天气效果
        globalWeather = globalWeather || {};
        globalWeather.type = 'rainy';
        globalWeather.duration = skill.rainyDayDuration || 3;
        globalWeather.powerBoost = skill.rainyDayPowerBoost || 0.5; // 50%加成
        addLog(`${caster.name} 使用 ${skill.name}，创造雨天环境！（持续${globalWeather.duration}回合，所有水属性技能威力+${Math.round(globalWeather.powerBoost * 100)}%）`, 'buff');
      }

      await delay(300);
    }

    // 执行敌人行动
    async function executeEnemyAction(enemy) {
      // 根据意图找到要使用的技能
      let skill = null;
      if (enemy.intent.skillId && enemy.skills) {
        skill = enemy.skills.find(s => s.id === enemy.intent.skillId);
      }

      // 检查能量是否足够
      if (skill && enemy.energy < skill.energyCost) {
        addLog(`${enemy.name} 能量不足，无法使用 ${skill.name}，跳过`);
        updateEnemyIntent(enemy);
        return;
      }

      // 检查目标是否有效
      let actualTarget = playerUnits.find(p => p.id === enemy.intent.targetId);
      if (!actualTarget || actualTarget.currentHp <= 0) {
        const alivePlayers = playerUnits.filter(p => p.currentHp > 0);
        if (alivePlayers.length > 0) {
          actualTarget = alivePlayers[Math.floor(Math.random() * alivePlayers.length)];
        } else {
          addLog(`${enemy.name} 无法选择目标，跳过`);
          return;
        }
      }

      // 消耗能量
      if (skill) {
        const energyBefore = enemy.energy;
        enemy.energy -= skill.energyCost;
        addLog(`${enemy.name} 使用 ${skill.name}（消耗${skill.energyCost}能量 ${energyBefore}→${enemy.energy}）`);

        // 使用技能执行逻辑（复用玩家技能执行）
        await executeEnemySkill(enemy, skill, actualTarget);
      } else {
        // 兼容旧代码：没有技能时使用原始的攻击逻辑
        if (enemy.intent.type === 'attack') {
          await executeEnemyBasicAttack(enemy, actualTarget);
        }
      }

      // 更新敌人意图
      updateEnemyIntent(enemy);
    }

    // 执行敌人技能（复用玩家技能执行逻辑）
    async function executeEnemySkill(enemy, skill, target) {
      // 处理休息技能（回复能量）
      if (skill.effect === 'energy_restore') {
        const energyRestore = skill.power || 5;
        const oldEnergy = enemy.energy;
        enemy.energy = Math.min(enemy.energy + energyRestore, MAX_ENERGY);
        const actualRestore = enemy.energy - oldEnergy;
        addLog(`${enemy.name} 使用 ${skill.name}，回复 ${actualRestore} 点能量（${oldEnergy}→${enemy.energy}）`, 'heal');
        return;
      }

      if (skill.target === 'single_enemy' || skill.target === 'all_enemy') {
        // 攻击技能
        let totalDamage = 0;

        // 检查蓄焰增伤buff
        let powerBonus = 0;
        if (enemy.flameCharge && enemy.flameChargeTurns > 0 && skill.element === 'fire') {
          powerBonus = enemy.flameChargePower || (enemy.energy * 10);
          addLog(`${enemy.name} 的蓄焰效果生效，火属性攻击威力+${powerBonus}！`, 'buff');
          enemy.flameCharge = false;
          enemy.flameChargeTurns = 0;
        }

        // 检查烈火护体下次火攻增伤
        if (enemy.wallOfFlamesPower > 0 && skill.element === 'fire') {
          powerBonus += enemy.wallOfFlamesPower;
          addLog(`${enemy.name} 的烈火护体效果生效，火属性攻击威力+${enemy.wallOfFlamesPower}！`, 'buff');
          enemy.wallOfFlamesPower = 0;
        }

        // 检查光能汇聚增伤（草系技能）
        let lightGatherBonus = 0;
        if (enemy.lightGatherStacks && enemy.lightGatherStacks > 0 && skill.element === 'grass') {
          // 光能爆轰：消耗所有光能汇聚层数
          if (skill.powerPerStack && skill.powerPerStack > 0) {
            lightGatherBonus = enemy.lightGatherStacks * skill.powerPerStack;
            addLog(`${enemy.name} 消耗 ${enemy.lightGatherStacks} 层光能汇聚，草系攻击威力+${lightGatherBonus}！`, 'buff');
            enemy.lightGatherStacks = 0;
          } else {
            // 其他草系技能：每次消耗1层光能汇聚
            lightGatherBonus = 60; // 每次草系输出技能+60威力
            addLog(`${enemy.name} 的光能汇聚效果生效，草系攻击威力+${lightGatherBonus}！`, 'buff');
            enemy.lightGatherStacks -= 1;
          }
        }
        powerBonus += lightGatherBonus;

        // 检查芬芳环境增伤（草系技能）
        if (battleEnvironment === 'fragrant' && skill.element === 'grass') {
          powerBonus += Math.floor(skill.power * 0.25);
          addLog(`芬芳环境影响，草系技能威力+25%！`, 'buff');
        }

        // 雷霆连击：多段攻击
        if (skill.effect === 'combo') {
          const hits = skill.comboHits || 3;
          const powerPerHit = skill.comboPower || Math.floor(skill.power / hits);

          for (let i = 0; i < hits; i++) {
            let hitDamage = Math.floor((powerPerHit + powerBonus) * (0.8 + Math.random() * 0.4));

            if (target.damageReduction && target.damageReduction > 0) {
              hitDamage = Math.floor(hitDamage * (1 - target.damageReduction));
            }
            if (target.shield && target.shield > 0) {
              if (hitDamage > target.shield) {
                hitDamage -= target.shield;
                target.shield = 0;
              } else {
                target.shield -= hitDamage;
                hitDamage = 0;
              }
            }

            totalDamage += hitDamage;
            target.currentHp = Math.max(0, target.currentHp - hitDamage);
            showDamageNumber(target.id, hitDamage, 'damage');

            // 必定灼烧：每段攻击必定附加灼烧层数
            if (skill.burnStacks && !skill.burnChance) {
              const existingBurn = target.debuffs.find(d => d.type === 'burn');
              if (existingBurn) {
                existingBurn.stacks += skill.burnStacks;
                existingBurn.remainingDuration = 3;
              } else {
                target.debuffs.push({
                  type: 'burn',
                  stacks: skill.burnStacks,
                  damagePercentPerStack: 0.02,
                  remainingDuration: 3
                });
              }
            }

            addLog(`${enemy.name} 使用 ${skill.name}，第${i + 1}段攻击造成 ${hitDamage} 伤害`, 'damage');
            await delay(200);
          }

          // 多段攻击结束后的必定灼烧日志
          if (skill.burnStacks && !skill.burnChance) {
            const existingBurn = target.debuffs.find(d => d.type === 'burn');
            addLog(`${target.name} 陷入灼烧状态！（${existingBurn ? existingBurn.stacks : skill.burnStacks}层，每层2%最大HP/回合，层数减半）`, 'damage');
          }
        } else {
          // 普通单次攻击：基础伤害 + 蓄焰/烈火护体增伤
          let damage = Math.floor((skill.power + powerBonus) * (0.8 + Math.random() * 0.4));

          if (target.damageReduction && target.damageReduction > 0) {
            damage = Math.floor(damage * (1 - target.damageReduction));
          }
          if (target.shield && target.shield > 0) {
            if (damage > target.shield) {
              damage -= target.shield;
              target.shield = 0;
            } else {
              target.shield -= damage;
              damage = 0;
            }
          }

          totalDamage = damage;
          target.currentHp = Math.max(0, target.currentHp - damage);
          showDamageNumber(target.id, damage, 'damage');
          addLog(`${enemy.name} 使用 ${skill.name}，对 ${target.name} 造成 ${damage} 伤害`, 'damage');
        }

        // 灼伤印记
        if (skill.effect === 'burnMark') {
          target.burnMark = true;
          target.burnMarkPower = skill.burnMarkPower || 20;
          addLog(`${target.name} 被施加「灼伤印记」`, 'debuff');
        }

        // 灼烧效果
        if (skill.effect === 'burn' || skill.burnStacks) {
          const burnChance = skill.burnChance ?? 1;
          if (Math.random() < burnChance) {
            const stacks = skill.burnStacks || 1;
            const existingBurn = target.debuffs.find(d => d.type === 'burn');
            if (existingBurn) {
              existingBurn.stacks += stacks;
              existingBurn.remainingDuration = 3;
            } else {
              target.debuffs.push({
                type: 'burn',
                stacks: stacks,
                damagePercentPerStack: 0.02,
                remainingDuration: 3
              });
            }
            addLog(`${target.name} 陷入灼烧状态！`, 'damage');
          }
        }

        updateHpBar(target);
        if (target.currentHp <= 0) addLog(`${target.name} 倒下了！`);

      } else if (skill.target === 'self') {
        // 自身目标技能
        if (skill.type === 'shield') {
          enemy.shield = (enemy.shield || 0) + skill.power;
          addLog(`${enemy.name} 使用 ${skill.name}，为自身施加 ${skill.power} 点护盾`);
        }
        if (skill.type === 'buff') {
          if (skill.speedBoost) {
            enemy.speedBoost = (enemy.speedBoost || 0) + skill.speedBoost;
            addLog(`${enemy.name} 使用 ${skill.name}，速度提升 ${skill.speedBoost} 级！`, 'buff');
          }
        }
      } else if (skill.target === 'ally') {
        // 治疗/护盾队友
        const allies = enemyUnits.filter(e => e.id !== enemy.id && e.currentHp > 0);
        if (allies.length > 0) {
          const allyTarget = allies[Math.floor(Math.random() * allies.length)];
          if (skill.type === 'heal') {
            const heal = Math.floor(skill.power * (0.8 + Math.random() * 0.4));
            allyTarget.currentHp = Math.min(allyTarget.maxHp, allyTarget.currentHp + heal);
            showDamageNumber(allyTarget.id, heal, 'heal');
            updateHpBar(allyTarget);
            addLog(`${enemy.name} 使用 ${skill.name}，为 ${allyTarget.name} 恢复 ${heal} HP`, 'heal');
          } else if (skill.type === 'shield') {
            allyTarget.shield = (allyTarget.shield || 0) + skill.power;
            addLog(`${enemy.name} 使用 ${skill.name}，为 ${allyTarget.name} 施加 ${skill.power} 点护盾`);
          }
        }
      }

      await delay(300);
    }

    // 执行敌人基础攻击（兼容旧代码）
    async function executeEnemyBasicAttack(enemy, target) {
      let damage = Math.floor(enemy.intent.power * (0.8 + Math.random() * 0.4));

      if (target.damageReduction && target.damageReduction > 0) {
        damage = Math.floor(damage * (1 - target.damageReduction));
      }
      if (target.shield && target.shield > 0) {
        if (damage > target.shield) {
          damage -= target.shield;
          target.shield = 0;
        } else {
          target.shield -= damage;
          damage = 0;
        }
      }

      target.currentHp = Math.max(0, target.currentHp - damage);
      showDamageNumber(target.id, damage, 'damage');
      updateHpBar(target);
      addLog(`${enemy.name} 攻击 ${target.name}，造成 ${damage} 伤害`, 'damage');

      // 火盾反伤 + 附加灼烧
      if (target.fireShield && target.reflectDamage > 0 && target.currentHp > 0) {
        const reflectDmg = Math.floor(target.reflectDamage * (0.8 + Math.random() * 0.4));
        enemy.currentHp = Math.max(0, enemy.currentHp - reflectDmg);
        showDamageNumber(enemy.id, reflectDmg, 'damage');
        updateHpBar(enemy);
        addLog(`${target.name} 的火盾反伤触发，对 ${enemy.name} 造成 ${reflectDmg} 火属性伤害！`, 'damage');

        // 火盾附加灼烧：受伤时攻击者获得灼烧
        const existingBurn = enemy.debuffs.find(d => d.type === 'burn');
        if (existingBurn) {
          existingBurn.stacks += 1;
          existingBurn.remainingDuration = 3;
          addLog(`${enemy.name} 受到灼烧（+1层，共${existingBurn.stacks}层）`, 'damage');
        } else {
          enemy.debuffs.push({
            type: 'burn',
            stacks: 1,
            damagePercentPerStack: 0.02,
            remainingDuration: 3
          });
          addLog(`${enemy.name} 陷入灼烧状态！`, 'damage');
        }

        if (enemy.currentHp <= 0) addLog(`${enemy.name} 倒下了！`);
      }
    }

    // 开始新的一轮
    function startRound() {
      if (battleEnded) return;

      // 模式3（以太术士模式）：不执行经典模式的startRound
      if (currentBattleMode === 3) {
        return;
      }

      isRoundExecuting = true;
      isBattleStarted = true;
      document.getElementById('skillPanel').classList.remove('visible');
      document.getElementById('commandList').style.display = 'none';

      addLog(`===== 第 ${currentRound} 轮开始 =====`);

      // 初始化敌人意图
      for (const enemy of enemyUnits) {
        if (enemy.currentHp > 0) {
          updateEnemyIntent(enemy);
        }
      }
      renderEnemyUnits();

      // 模式2（宝可梦模式）：初始化行动队列
      if (currentBattleMode === 2) {
        executedPlayerIds.clear();
        playerActionQueue = buildPlayerActionQueue();
        enemyActionQueue = buildEnemyActionQueue();
        // 显示行动顺序
        const allActions = [...playerActionQueue.map(a => ({...a, queueType: 'player'})), ...enemyActionQueue.map(a => ({...a, queueType: 'enemy'}))];
        allActions.sort((a, b) => b.caster.speed - a.caster.speed);
        showActionOrder(allActions);
        updateTurnDisplay();
      }

      // 开始执行第一个行动
      executeNextAction();
    }

    // 构建玩家行动队列（模式2）
    function buildPlayerActionQueue() {
      const queue = [];
      for (const cmd of playerCommands) {
        if (cmd.status !== 'pending') continue;
        const caster = playerUnits.find(p => p.id === cmd.casterId);
        if (!caster || caster.currentHp <= 0) continue;
        const skill = caster.skills.find(s => s.id === cmd.skillId);
        if (!skill) continue;
        queue.push({
          type: 'player',
          caster: caster,
          skill: skill,
          targetId: cmd.targetId,
          command: cmd
        });
      }
      return queue;
    }

    // 构建敌人行动队列（模式2）
    function buildEnemyActionQueue() {
      const queue = [];
      for (const enemy of enemyUnits) {
        if (enemy.currentHp <= 0) continue;
        queue.push({
          type: 'enemy',
          caster: enemy,
          intent: enemy.intent
        });
      }
      return queue;
    }

    // 执行下一个行动
    async function executeNextAction() {
      if (battleEnded) {
        isRoundExecuting = false;
        return;
      }

      // 模式2（宝可梦模式）：使用单独的行动队列
      if (currentBattleMode === 2) {
        await executeNextActionMode2();
        return;
      }

      // 模式1（经典模式）：构建统一行动队列
      actionQueue = buildActionQueue();
      showActionOrder(actionQueue);

      // 找到当前速度最快的行动者
      while (currentActionIndex < actionQueue.length) {
        const action = actionQueue[currentActionIndex];

        // 检查行动者是否仍然存活
        if (action.caster.currentHp <= 0) {
          currentActionIndex++;
          continue;
        }

        // 更新UI：显示当前行动者
        updateTurnDisplay(action);

        // 根据行动者类型执行
        if (action.type === 'enemy') {
          // 敌人行动：立即执行
          await executeAction(action);
          // 重新计算敌人意图
          updateEnemyIntent(action.caster);
          renderEnemyUnits();
        } else {
          // 玩家行动
          if (action.hasCommand && action.skill) {
            // 有预设指令，立即执行
            await executePlayerActionAndContinue(
              action.caster,
              action.skill,
              action.targetId
            );
            continue;
          } else {
            // 没有指令，等待玩家选择技能
            selectedPlayer = action.caster;
            renderSkillPanel(action.caster);
            renderPlayerUnits();
            return; // 等待玩家选择技能
          }
        }

        currentActionIndex++;
        await delay(200);

        // 检查战斗结束
        if (checkBattleEnd()) {
          isRoundExecuting = false;
          return;
        }
      }

      // 当前行动者都已行动完毕，进入下一轮结束处理
      await finishRound();
    }

    // 模式2（宝可梦模式）：执行下一个行动
    async function executeNextActionMode2() {
      if (battleEnded) {
        isRoundExecuting = false;
        return;
      }

      // 构建合并后的行动队列
      const allActions = [];
      playerActionQueue.forEach(a => allActions.push({...a, actionType: 'player'}));
      enemyActionQueue.forEach(a => allActions.push({...a, actionType: 'enemy'}));
      allActions.sort((a, b) => b.caster.speed - a.caster.speed);

      // 找到下一个可执行的行动
      while (allActions.length > 0) {
        const action = allActions[0];

        // 检查行动者是否仍然存活
        if (action.caster.currentHp <= 0) {
          allActions.shift();
          continue;
        }

        // 更新UI
        updateTurnDisplay(action);

        if (action.actionType === 'enemy') {
          // 敌人行动
          await executeAction(action);
          allActions.shift();
          updateEnemyIntent(action.caster);
          renderEnemyUnits();
        } else {
          // 玩家行动：等待玩家选择
          selectedPlayer = action.caster;
          renderSkillPanel(action.caster);
          renderPlayerUnits();
          // 将当前行动保存到外部变量
          currentAction = action;
          return;
        }

        await delay(200);

        // 检查战斗结束
        if (checkBattleEnd()) {
          isRoundExecuting = false;
          return;
        }
      }

      // 所有行动执行完毕
      await finishRound();
    }

    // 轮次结束处理
    async function finishRound() {
      // 标记所有指令为已执行
      playerCommands.forEach(cmd => {
        if (cmd.status === 'pending') cmd.status = 'executed';
      });

      hideActionOrder();
      currentActionIndex = 0;

      // 回合结束 - 处理状态效果
      await delay(300);

      // 处理灼烧效果（层数系统）
      for (const unit of [...playerUnits, ...enemyUnits]) {
        if (unit.currentHp <= 0) continue;

        const burnDebuff = unit.debuffs.find(d => d.type === 'burn');
        if (burnDebuff && burnDebuff.stacks > 0) {
          const burnDamage = Math.floor(unit.maxHp * burnDebuff.damagePercentPerStack * burnDebuff.stacks);
          unit.currentHp = Math.max(0, unit.currentHp - burnDamage);
          showDamageNumber(unit.id, burnDamage, 'damage');
          updateHpBar(unit);
          addLog(`${unit.name} 受到灼烧伤害 ${burnDamage} HP（${burnDebuff.stacks}层）`, 'damage');

          burnDebuff.stacks = Math.max(1, Math.floor(burnDebuff.stacks / 2));
          burnDebuff.remainingDuration--;

          if (burnDebuff.remainingDuration <= 0) {
            unit.debuffs = unit.debuffs.filter(d => d.type !== 'burn');
            addLog(`${unit.name} 的灼烧状态消失了`);
          }
        }

        if (unit.combustionStacks > 0 && unit.currentHp > 0) {
          unit.combustionTurnsLeft--;
          if (unit.combustionTurnsLeft <= 0) {
            const combustionDamage = Math.floor(unit.currentHp * 0.3);
            unit.currentHp = Math.max(0, unit.currentHp - combustionDamage);
            showDamageNumber(unit.id, combustionDamage, 'damage');
            updateHpBar(unit);
            addLog(`${unit.name} 的「燃尽印记」触发，受到 ${combustionDamage} 真实伤害！`, 'damage');
            unit.combustionStacks = 0;
          } else {
            addLog(`${unit.name} 的「燃尽印记」剩余 ${unit.combustionTurnsLeft} 回合`);
          }
        }

        if (unit.slowed && unit.currentHp > 0) {
          unit.slowTurns--;
          if (unit.slowTurns <= 0) {
            unit.slowed = false;
            addLog(`${unit.name} 的减速状态消失了`);
          }
        }

        if (unit.paralyzed && unit.currentHp > 0) {
          unit.paralyzeTurns--;
          if (unit.paralyzeTurns <= 0) {
            unit.paralyzed = false;
            addLog(`${unit.name} 的麻痹状态消失了`);
          }
        }

        if (unit.wet && unit.currentHp > 0) {
          unit.wetTurns--;
          if (unit.wetTurns <= 0) {
            unit.wet = false;
            addLog(`${unit.name} 的潮湿状态消失了`);
          }
        }

        // ==================== 草系效果处理 ====================
        // 寄生种子效果
        const parasiticSeedDebuff = unit.debuffs.find(d => d.type === 'parasitic_seed');
        if (parasiticSeedDebuff && parasiticSeedDebuff.remainingDuration > 0 && unit.currentHp > 0) {
          // 目标受到伤害
          const drainDamage = Math.floor(unit.maxHp * parasiticSeedDebuff.drainPercent);
          unit.currentHp = Math.max(0, unit.currentHp - drainDamage);
          showDamageNumber(unit.id, drainDamage, 'damage');
          updateHpBar(unit);
          addLog(`${unit.name} 受到寄生种子伤害 ${drainDamage} HP（-${Math.round(parasiticSeedDebuff.drainPercent * 100)}%HP）`, 'damage');

          // 施法者回复
          if (parasiticSeedDebuff.caster && parasiticSeedDebuff.caster.currentHp > 0) {
            const healAmount = Math.min(drainDamage, parasiticSeedDebuff.caster.maxHp - parasiticSeedDebuff.caster.currentHp);
            if (healAmount > 0) {
              parasiticSeedDebuff.caster.currentHp += healAmount;
              showDamageNumber(parasiticSeedDebuff.caster.id, healAmount, 'heal');
              updateHpBar(parasiticSeedDebuff.caster);
              addLog(`${parasiticSeedDebuff.caster.name} 回复 ${healAmount} HP（寄生种子吸收）`, 'heal');
            }
          }

          parasiticSeedDebuff.remainingDuration--;
          if (parasiticSeedDebuff.remainingDuration <= 0) {
            unit.debuffs = unit.debuffs.filter(d => d.type !== 'parasitic_seed');
            addLog(`${unit.name} 的寄生种子状态消失了`);
          }
        }

        // 枯萎效果
        const witherDebuff = unit.debuffs.find(d => d.type === 'wither');
        if (witherDebuff && witherDebuff.stacks > 0 && unit.currentHp > 0) {
          // 枯萎伤害 = 层数 × 每层威力（按目标属性计算）
          const witherDamage = witherDebuff.stacks * (witherDebuff.damagePerStack || 10);
          unit.currentHp = Math.max(0, unit.currentHp - witherDamage);
          showDamageNumber(unit.id, witherDamage, 'damage');
          updateHpBar(unit);
          addLog(`${unit.name} 受到枯萎伤害 ${witherDamage} HP（${witherDebuff.stacks}层）`, 'damage');

          witherDebuff.remainingDuration--;
          if (witherDebuff.remainingDuration <= 0) {
            unit.debuffs = unit.debuffs.filter(d => d.type !== 'wither');
            addLog(`${unit.name} 的枯萎状态消失了`);
          }
        }

        // 扎根状态回复
        if (unit.rootBound && unit.rootBoundTurns > 0 && unit.currentHp > 0) {
          const rootHeal = Math.floor(unit.maxHp * 0.08);
          unit.currentHp = Math.min(unit.maxHp, unit.currentHp + rootHeal);
          showDamageNumber(unit.id, rootHeal, 'heal');
          updateHpBar(unit);
          addLog(`${unit.name} 扎根回复 ${rootHeal} HP（+8%HP）`, 'heal');

          unit.rootBoundTurns--;
          if (unit.rootBoundTurns <= 0) {
            unit.rootBound = false;
            addLog(`${unit.name} 的扎根状态消失了`);
          }
        }

        // 芬芳环境回复（己方全体）
        if (unit.fragrantBloom && unit.fragrantBloomTurns > 0 && unit.currentHp > 0) {
          const fragrantHeal = Math.floor(unit.maxHp * 0.05);
          unit.currentHp = Math.min(unit.maxHp, unit.currentHp + fragrantHeal);
          showDamageNumber(unit.id, fragrantHeal, 'heal');
          updateHpBar(unit);
          addLog(`${unit.name} 受到芬芳环境影响回复 ${fragrantHeal} HP（+5%HP）`, 'heal');
        }
      }

      // 更新战场环境回合数
      if (battleEnvironment && battleEnvironmentTurns > 0) {
        battleEnvironmentTurns--;
        if (battleEnvironmentTurns <= 0) {
          addLog(`芬芳环境消散了`);
          battleEnvironment = null;
        }
      }

      // 更新芬芳绽放的持续回合
      playerUnits.forEach(unit => {
        if (unit.fragrantBloom) {
          unit.fragrantBloomTurns--;
          if (unit.fragrantBloomTurns <= 0) {
            unit.fragrantBloom = false;
          }
        }
      });

      // ==================== 水系状态效果回合处理（模式3 finishRound）====================
      for (const unit of [...playerUnits, ...enemyUnits]) {
        if (unit.currentHp <= 0) continue;

        // 处理浸透状态（特防-1级/层）
        const waterSoakDebuff3 = unit.debuffs.find(d => d.type === 'water_soak');
        if (waterSoakDebuff3 && waterSoakDebuff3.remainingDuration > 0) {
          waterSoakDebuff3.remainingDuration--;
          if (waterSoakDebuff3.remainingDuration <= 0) {
            unit.debuffs = unit.debuffs.filter(d => d.type !== 'water_soak');
            addLog(`${unit.name} 的「浸透」状态消失了`);
          }
        }

        // 处理溺水状态
        const drowningDebuff3 = unit.debuffs.find(d => d.type === 'drowning');
        if (drowningDebuff3 && drowningDebuff3.remainingDuration > 0) {
          drowningDebuff3.remainingDuration--;
          if (drowningDebuff3.remainingDuration <= 0) {
            unit.debuffs = unit.debuffs.filter(d => d.type !== 'drowning');
            addLog(`${unit.name} 的「溺水」状态消失了`);
          }
        }

        // 处理浑浊状态（命中率-1级/层）
        const muddyDebuff3 = unit.debuffs.find(d => d.type === 'muddy');
        if (muddyDebuff3 && muddyDebuff3.remainingDuration > 0) {
          muddyDebuff3.remainingDuration--;
          if (muddyDebuff3.remainingDuration <= 0) {
            unit.debuffs = unit.debuffs.filter(d => d.type !== 'muddy');
            addLog(`${unit.name} 的「浑浊」状态消失了`);
          }
        }

        // 处理蒸汽灼伤状态
        const steamBurnDebuff3 = unit.debuffs.find(d => d.type === 'steam_burn');
        if (steamBurnDebuff3 && steamBurnDebuff3.remainingDuration > 0) {
          const steamBurnDamage3 = Math.floor(unit.maxHp * steamBurnDebuff3.damagePercentPerStack * steamBurnDebuff3.stacks);
          unit.currentHp = Math.max(0, unit.currentHp - steamBurnDamage3);
          showDamageNumber(unit.id, steamBurnDamage3, 'damage');
          updateHpBar(unit);
          addLog(`${unit.name} 受到蒸汽灼伤 ${steamBurnDamage3} HP`, 'damage');

          steamBurnDebuff3.remainingDuration--;
          if (steamBurnDebuff3.remainingDuration <= 0) {
            unit.debuffs = unit.debuffs.filter(d => d.type !== 'steam_burn');
            addLog(`${unit.name} 的「蒸汽灼伤」状态消失了`);
          }
        }

        // 处理虚弱状态
        const weaknessDebuff3 = unit.debuffs.find(d => d.type === 'weakness');
        if (weaknessDebuff3 && weaknessDebuff3.remainingDuration > 0) {
          weaknessDebuff3.remainingDuration--;
          if (weaknessDebuff3.remainingDuration <= 0) {
            unit.debuffs = unit.debuffs.filter(d => d.type !== 'weakness');
            addLog(`${unit.name} 的「虚弱」状态消失了`);
          }
        }

        // 处理清泉护盾状态（每回合回复10%HP并清除1个debuff）
        const clearSpringBuff3 = unit.buffs?.find(b => b.type === 'clear_spring');
        if (clearSpringBuff3 && clearSpringBuff3.remainingDuration > 0) {
          const clearSpringHeal3 = Math.floor(unit.maxHp * clearSpringBuff3.healPercent);
          unit.currentHp = Math.min(unit.maxHp, unit.currentHp + clearSpringHeal3);
          showDamageNumber(unit.id, clearSpringHeal3, 'heal');
          updateHpBar(unit);
          addLog(`${unit.name} 的「清泉护盾」回复 ${clearSpringHeal3} HP`, 'heal');

          if (unit.debuffs && unit.debuffs.length > 0) {
            const removedDebuff3 = unit.debuffs.shift();
            addLog(`${unit.name} 的「${removedDebuff3.type}」状态被清泉护盾清除`);
          }

          clearSpringBuff3.remainingDuration--;
          if (clearSpringBuff3.remainingDuration <= 0) {
            unit.buffs = unit.buffs.filter(b => b.type !== 'clear_spring');
            addLog(`${unit.name} 的「清泉护盾」状态消失了`);
          }
        }

        // 处理流水状态（速度+1级）
        const flowBuff3 = unit.buffs?.find(b => b.type === 'flow');
        if (flowBuff3 && flowBuff3.remainingDuration > 0) {
          flowBuff3.remainingDuration--;
          if (flowBuff3.remainingDuration <= 0) {
            unit.buffs = unit.buffs.filter(b => b.type !== 'flow');
            addLog(`${unit.name} 的「流水」状态消失了`);
          }
        }
      }

      // 处理雨天天气
      if (globalWeather && globalWeather.type === 'rainy' && globalWeather.duration > 0) {
        globalWeather.duration--;
        if (globalWeather.duration <= 0) {
          globalWeather = null;
          addLog(`雨天天气结束了`);
        }
      }

      await delay(500);

      if (!checkBattleEnd()) {
        // 进入下一轮
        currentRound++;
        isRoundExecuting = false;

        // 更新所有单位的buff/debuff回合数
        updateBuffTurns();

        // 清空指令
        playerCommands = [];
        currentActionIndex = 0;

        renderEnemyUnits();
        renderPlayerUnits();
        document.getElementById('commandList').style.display = 'block';
        renderCommandList();
        updateTurnDisplay();
        addLog(`===== 第 ${currentRound} 轮开始 =====`);

        // 开始下一轮
        setTimeout(() => startRound(), 300);
      }
    }

    // 更新所有buff/debuff的持续回合数
    function updateBuffTurns() {
      // 更新玩家单位的减伤回合
      [...playerUnits, ...enemyUnits].forEach(unit => {
        if (unit.damageReductionTurns && unit.damageReductionTurns > 0) {
          unit.damageReductionTurns--;
          if (unit.damageReductionTurns === 0) {
            unit.damageReduction = 0;
            addLog(`${unit.name} 的减伤效果消失了`, 'buff');
          }
        }
        if (unit.resistanceTurns) {
          for (const element in unit.resistanceTurns) {
            unit.resistanceTurns[element]--;
            if (unit.resistanceTurns[element] <= 0) {
              unit.resistances[element] = 0;
              delete unit.resistanceTurns[element];
              addLog(`${unit.name} 的 ${element} 属性抗性消失了`, 'buff');
            }
          }
        }
        // 更新防反状态回合
        if (unit.counterStance && unit.counterStanceTurns > 0) {
          unit.counterStanceTurns--;
          if (unit.counterStanceTurns === 0) {
            unit.counterStance = false;
            addLog(`${unit.name} 的防反之姿消失了`, 'buff');
          }
        }
      });
    }

    // ==================== 敌人AI决策系统 ====================

    // 获取单个属性对目标的克制倍率
    function getTypeMultiplier(attackerElement, defenderElement) {
      const chart = TYPE_CHART[attackerElement];
      if (!chart) return 1;
      return chart[defenderElement] || 1;
    }

    // 计算技能对目标的综合克制倍率（支持单属性和双属性）
    function calculateDamageMultiplier(skillElement, targetElements) {
      let multiplier = 1;
      const elements = Array.isArray(targetElements) ? targetElements : [targetElements];
      elements.forEach(targetElement => {
        multiplier *= getTypeMultiplier(skillElement, targetElement);
      });
      return multiplier;
    }

    // 判断属性克制
    function isSuperEffective(attackerElement, defenderElement) {
      const chart = TYPE_CHART[attackerElement];
      return chart && chart[defenderElement] === 2;
    }

    // 获取HP百分比
    function getHpPercent(unit) {
      return (unit.currentHp / unit.maxHp) * 100;
    }

    // 1.1 攻击欲望计算
    function calculateAttackDesire(enemy) {
      let score = 30; // 基础分

      // HP因素
      const hpPercent = getHpPercent(enemy);
      if (hpPercent > 50) score += 20;
      else if (hpPercent > 25) score += 0;
      else score -= 20;

      // 有有利buff
      if (enemy.buffs?.some(b => b.type === 'attack_up' || b.type === 'power')) {
        score += 15;
      }

      // 有减益debuff
      if (enemy.debuffs?.some(d => d.type === 'attack_down')) {
        score -= 10;
      }

      // 能量因素
      if (enemy.energy >= 3) score += 15;
      else score -= 15;

      // 敌方有高价值目标(血量低)
      const lowHpTargets = playerUnits.filter(p => p.currentHp > 0 && getHpPercent(p) < 50);
      if (lowHpTargets.length > 0) score += 10;

      // 有可用的攻击技能
      const hasAttackSkill = enemy.skills?.some(s =>
        s.type === 'fire' || s.type === 'special' || s.type === 'physical' ||
        s.type === 'ice' || s.type === 'water' || s.type === 'electric'
      );
      if (hasAttackSkill) score += 10;
      else score -= 50;

      return score;
    }

    // 1.2 治疗欲望计算
    function calculateHealDesire(enemy) {
      let score = 10; // 基础分
      const hpPercent = getHpPercent(enemy);

      // HP因素
      if (hpPercent <= 50) score += 30;
      if (hpPercent <= 25) score += 50;

      // 能量因素
      if (enemy.energy >= 3) score += 10;

      // 有治疗技能
      const hasHealSkill = enemy.skills?.some(s =>
        s.type === 'heal' || s.effect?.includes('heal')
      );
      if (hasHealSkill) score += 20;
      else score -= 100;

      return score;
    }

    // 1.3 防御欲望计算
    function calculateDefendDesire(enemy) {
      let score = 15; // 基础分
      const hpPercent = getHpPercent(enemy);

      // HP因素
      if (hpPercent <= 30) score += 40;

      // 能量因素
      if (enemy.energy <= 2) score += 15;

      // 有嘲讽目标(保护自己)
      if (enemy.buffs?.some(b => b.type === 'taunt')) {
        score += 10;
      }

      // 有护盾技能
      const hasShieldSkill = enemy.skills?.some(s =>
        s.type === 'shield' || s.effect?.includes('shield')
      );
      if (hasShieldSkill) score += 15;
      else score -= 30;

      return score;
    }

    // 1.4 休息欲望计算
    function calculateRestDesire(enemy) {
      let score = 5; // 基础分

      // 能量因素
      if (enemy.energy <= 2) score += 60;
      else if (enemy.energy <= 4) score += 20;

      // HP高时更适合休息
      if (getHpPercent(enemy) >= 80) score += 15;

      // 有高威力技能可用且能量>=2时，降低休息欲望
      const hasStrongSkill = enemy.skills?.some(s =>
        (s.power >= 80) && s.energyCost <= enemy.energy && s.energyCost >= 2
      );
      if (hasStrongSkill) score -= 30;

      return score;
    }

    // 1.5 辅助欲望计算
    function calculateSupportDesire(enemy) {
      let score = 10; // 基础分

      // 队友血量低
      const allies = enemyUnits.filter(e => e.id !== enemy.id && e.currentHp > 0);
      const lowHpAllies = allies.filter(a => getHpPercent(a) < 50);
      if (lowHpAllies.length > 0) score += 25;

      // 己方有增益机会
      const hasBuffSkill = enemy.skills?.some(s => s.type === 'buff');
      if (hasBuffSkill) score += 15;

      // 己方满员满状态
      if (allies.length === 0 || allies.every(a => getHpPercent(a) > 80 && (!a.buffs || a.buffs.length === 0))) {
        score -= 20;
      }

      // 有辅助技能
      const hasSupportSkill = enemy.skills?.some(s =>
        s.type === 'buff' || s.type === 'debuff' || s.effect?.includes('buff')
      );
      if (hasSupportSkill) score += 10;
      else score -= 50;

      return score;
    }

    // 2.1 主决策函数
    function decideActionType(enemy) {
      const desires = {
        attack: calculateAttackDesire(enemy),
        heal: calculateHealDesire(enemy),
        defend: calculateDefendDesire(enemy),
        rest: calculateRestDesire(enemy),
        support: calculateSupportDesire(enemy)
      };

      // 调试日志
      console.log(`${enemy.name} 欲望评分:`, desires);

      // 选择欲望最高的行动
      const sorted = Object.entries(desires).sort((a, b) => b[1] - a[1]);
      return sorted[0][0];
    }

    // 3.1 根据行动类型筛选可用技能
    function getUsableSkills(enemy, actionType) {
      if (!enemy.skills) return [];

      return enemy.skills.filter(skill => {
        // 检查能量是否足够
        if (skill.energyCost > enemy.energy) return false;

        // 根据行动类型匹配技能类型
        switch (actionType) {
          case 'attack':
            return skill.type === 'fire' || skill.type === 'special' ||
              skill.type === 'physical' || skill.type === 'ice' ||
              skill.type === 'water' || skill.type === 'electric';
          case 'heal':
            return skill.type === 'heal' || skill.effect?.includes('heal');
          case 'defend':
            return skill.type === 'shield' || skill.effect?.includes('shield');
          case 'rest':
            return skill.id === 'rest';
          case 'support':
            return skill.type === 'buff' || skill.type === 'debuff';
          default:
            return false;
        }
      });
    }

    // 3.2 技能评分函数
    function scoreSkill(enemy, skill, actionType) {
      let score = 50; // 基础分

      switch (actionType) {
        case 'attack':
          // 威力越高越好
          score += (skill.power || 0) * 0.5;
          // 消耗越低越好
          score -= skill.energyCost * 10;
          // 有额外效果更好
          if (skill.effect) score += 15;
          break;

        case 'heal':
          // 治疗量越高越好
          score += (skill.power || 0) * 0.8;
          break;

        case 'defend':
          // 护盾值越高越好
          score += (skill.power || 0) * 0.6;
          break;

        case 'rest':
          // 能量回复越多越好
          score += (skill.power || 0) * 5;
          break;

        case 'support':
          // 根据效果类型评分
          if (skill.effect?.includes('buff')) score += 20;
          if (skill.effect?.includes('debuff')) score += 15;
          break;
      }

      // 随机性（让AI不那么可预测）
      score += Math.random() * 10;

      return score;
    }

    // 4.1 攻击目标选择
    function selectAttackTarget(enemy, playerUnits) {
      const alivePlayers = playerUnits.filter(p => p.currentHp > 0);
      if (alivePlayers.length === 0) return null;

      // 优先级排序
      const targets = alivePlayers.map(target => {
        let priority = 0;

        // 1. 嘲讽目标最高优先
        if (target.debuffs?.some(d => d.type === 'taunt')) {
          priority += 100;
        }

        // 2. 属性克制（2倍伤害）
        if (isSuperEffective(enemy.element, target.element)) {
          priority += 50;
        }

        // 3. 被敌方克制（先击杀威胁）
        if (isSuperEffective(target.element, enemy.element)) {
          priority += 30;
        }

        // 4. 血量最低目标
        priority += (100 - getHpPercent(target)) * 0.5;

        // 5. 无增益状态目标
        if (!target.buffs || target.buffs.length === 0) {
          priority += 10;
        }

        return { target, priority };
      });

      // 选择优先级最高的
      targets.sort((a, b) => b.priority - a.priority);
      return targets[0].target;
    }

    // 5.2 技能类型映射到意图类型
    function mapSkillTypeToIntentType(skillType) {
      const map = {
        fire: 'attack', special: 'attack', physical: 'attack',
        ice: 'attack', water: 'attack', electric: 'attack',
        heal: 'heal', shield: 'defend', buff: 'buff', debuff: 'debuff',
        energy: 'defend'
      };
      return map[skillType] || 'attack';
    }

    // 5.3 更新敌人意图（智能AI版本）
    function updateEnemyIntent(enemy) {
      // 确保敌人有技能
      if (!enemy.skills || enemy.skills.length === 0) {
        enemy.skills = assignSkillsByElement(enemy.element, enemy.id);
      }

      // 1. 决策行动类型
      let actionType = decideActionType(enemy);
      console.log(`${enemy.name} 决定行动: ${actionType}`);

      // 2. 选择具体技能
      let usableSkills = getUsableSkills(enemy, actionType);

      // 如果首选类型没有可用技能，尝试降级
      if (usableSkills.length === 0) {
        console.log(`${enemy.name} 没有可用的${actionType}技能，尝试备用方案`);

        // 能量不足时优先休息
        if (enemy.energy < 3) {
          usableSkills = getUsableSkills(enemy, 'rest');
          if (usableSkills.length > 0) {
            actionType = 'rest';
          }
        }

        // 尝试防御
        if (usableSkills.length === 0) {
          usableSkills = getUsableSkills(enemy, 'defend');
          if (usableSkills.length > 0) {
            actionType = 'defend';
          }
        }

        // 尝试攻击（即使能量不足也可能用低消耗技能）
        if (usableSkills.length === 0) {
          usableSkills = enemy.skills.filter(s => s.type !== 'energy');
          if (usableSkills.length > 0) {
            actionType = 'attack';
          }
        }
      }

      // 如果仍然没有可用技能，默认休息
      if (usableSkills.length === 0) {
        console.log(`${enemy.name} 没有可用技能，选择休息`);
        enemy.intent = {
          type: 'defend',
          skillId: 'rest',
          power: 5,
          targetId: enemy.id,
          element: null
        };
        renderEnemyUnits();
        return;
      }

      // 评分选择最佳技能
      const scored = usableSkills.map(skill => ({
        skill,
        score: scoreSkill(enemy, skill, actionType)
      }));
      scored.sort((a, b) => b.score - a.score);
      const bestSkill = scored[0].skill;
      console.log(`${enemy.name} 选择技能: ${bestSkill.name} (评分: ${scored[0].score.toFixed(1)})`);

      // 3. 选择目标
      let targetId;
      // 首先检查技能目标类型
      if (bestSkill.target === 'self') {
        // 自身目标：防御类技能（如火盾）目标为自己
        targetId = enemy.id;
      } else if (actionType === 'rest') {
        // 休息类：目标为自己
        targetId = enemy.id;
      } else if (bestSkill.target === 'ally' || actionType === 'support' || actionType === 'heal') {
        // 治疗/辅助己方，选择血量最低的队友
        const allies = enemyUnits.filter(e => e.id !== enemy.id && e.currentHp > 0);
        if (allies.length > 0) {
          const lowestHpAlly = allies.sort((a, b) =>
            (a.currentHp / a.maxHp) - (b.currentHp / b.maxHp)
          )[0];
          targetId = lowestHpAlly?.id || enemy.id;
        } else {
          targetId = enemy.id;
        }
      } else {
        // 攻击敌方
        const target = selectAttackTarget(enemy, playerUnits);
        targetId = target?.id || playerUnits[0]?.id;
      }

      // 4. 生成意图
      enemy.intent = {
        type: mapSkillTypeToIntentType(bestSkill.type),
        skillId: bestSkill.id,
        power: bestSkill.power || 0,
        targetId: targetId,
        element: bestSkill.element || enemy.element
      };

      console.log(`${enemy.name} 意图: 技能=${bestSkill.name}(target=${bestSkill.target}), 类型=${enemy.intent.type}, 目标=${targetId}`);
      renderEnemyUnits();
    }

    function delay(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

    // ==================== 战斗结束检查 ====================
    function checkBattleEnd() {
      const playersAlive = playerUnits.filter(u => u.currentHp > 0).length;
      const enemiesAlive = enemyUnits.filter(u => u.currentHp > 0).length;
      if (playersAlive === 0) {
        battleEnded = true;
        showBattleEnd(false);
        return true;
      }
      if (enemiesAlive === 0) {
        battleEnded = true;
        showBattleEnd(true);
        return true;
      }
      return false;
    }

    function showBattleEnd(victory) {
      const overlay = document.getElementById('battleEndOverlay');
      const title = document.getElementById('endTitle');
      title.textContent = victory ? '胜利' : '失败';
      title.className = 'end-title ' + (victory ? 'victory' : 'defeat');
      overlay.classList.add('visible');
    }

    function restartBattle() {
      // 深拷贝恢复初始状态
      playerUnits.length = 0;
      INITIAL_PLAYER_CONFIG.forEach(u => playerUnits.push(JSON.parse(JSON.stringify(u))));
      enemyUnits.length = 0;
      INITIAL_ENEMY_CONFIG.forEach(u => enemyUnits.push(JSON.parse(JSON.stringify(u))));
      currentRound = 1;
      battleEnded = false;
      selectedPlayer = null;
      playerCommands = [];
      actionQueue = [];
      isRoundExecuting = false;
      isBattleStarted = false;
      isPreparing = false;
      isExecuting = false;
      executedPlayerIds.clear();
      playerActionQueue = [];
      enemyActionQueue = [];
      currentActionIndex = 0;
      currentAction = null;
      document.getElementById('battleEndOverlay').classList.remove('visible');
      document.getElementById('commandList').style.display = 'block';
      document.getElementById('logContent').innerHTML = '';
      hideActionOrder();

      // 重新初始化技能（确保所有单位都有技能）
      initializeCompanionSkills();
      initializeEnemySkills();

      renderPlayerUnits();
      renderEnemyUnits();
      renderSkillPanel(null);
      renderCommandList();
      updateTurnDisplay();

      // 不自动开始战斗，让玩家可以先切换模式
      addLog('===== 战斗模拟 =====');
      addLog('点击伙伴开始行动！');
    }

    // ==================== 初始化 ====================
    function init() {
      // 初始化初始配置（在技能分配之后）
      INITIAL_PLAYER_CONFIG = JSON.parse(JSON.stringify(playerUnits));
      INITIAL_ENEMY_CONFIG = JSON.parse(JSON.stringify(enemyUnits));

      // 调试日志：验证初始化状态
      console.log('=== 战斗初始化 ===');
      console.log('当前模式: ' + getModeName(currentBattleMode));
      playerUnits.forEach(unit => {
        console.log(`${unit.name}: HP=${unit.currentHp}/${unit.maxHp}, energy=${unit.energy}, skills=${unit.skills.length}`);
        if (unit.skills.length === 0) {
          console.warn(`警告: ${unit.name} 没有技能！`);
        }
      });

      // 初始化敌人意图
      for (const enemy of enemyUnits) {
        if (enemy.currentHp > 0) {
          updateEnemyIntent(enemy);
        }
      }

      renderPlayerUnits();
      renderEnemyUnits();
      renderCommandList();
      updateTurnDisplay();

      // 初始化模式2的预备状态
      if (currentBattleMode === 2) {
        isPreparing = true;
        document.getElementById('actionOrderDisplay').classList.add('visible');
      }

      // 不自动开始战斗，让玩家可以先切换模式
      addLog('===== 战斗模拟 =====');
      addLog('点击伙伴开始行动！');

      // 只有当玩家点击伙伴时才检查是否开始战斗
      // 监听玩家点击事件，在第一个玩家行动时自动开始

      document.addEventListener('click', (e) => {
        if (wasDragReleased) {
          wasDragReleased = false;
          return;
        }
        if (!e.target.closest('.unit.player') && !e.target.closest('.skill-panel') && !e.target.closest('.skill-card')) {
          if (!isDragging) deselectPlayer();
        }
      });
    }

    init();
  </script>
</body>
