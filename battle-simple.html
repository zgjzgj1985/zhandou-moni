<html lang="zh-CN">

  <title>战斗模拟</title>

<body>
  <div class="battle-container">
    <button class="skill-book-btn" onclick="window.location.href='skill-book.html'">图鉴</button>

    <!-- 模式切换按钮 -->

      <button class="mode-switch-btn mode-2" id="mode2Btn" onclick="switchBattleMode(2)">宝可梦模式</button>
      <button class="mode-switch-btn mode-3" id="mode3Btn" onclick="switchBattleMode(3)">以太术士模式</button>
      <button class="mode-switch-btn custom-btn" id="customBtn" onclick="openCustomBattleEditor()">自定义战斗</button>

    <!-- 自定义战斗编辑界面 -->

          <div class="custom-battle-title">自定义战斗配置</div>
          <div class="custom-battle-mode-select">
            <button class="custom-mode-btn active" id="customMode1" onclick="selectCustomMode(1)">经典</button>
            <button class="custom-mode-btn" id="customMode2" onclick="selectCustomMode(2)">宝可梦</button>
            <button class="custom-mode-btn" id="customMode3" onclick="selectCustomMode(3)">术士</button>
          </div>
          <button class="custom-battle-close" onclick="closeCustomBattleEditor()">&times;</button>
        </div>

        <!-- 伙伴配置 -->
        <div class="custom-battle-section">
          <div class="custom-battle-section-title">
            <span>己方伙伴</span>
            <span class="count" id="playerCount">3/5</span>
          </div>
          <div id="playerList"></div>
          <button class="custom-battle-add-btn" id="addPlayerBtn" onclick="addCustomPlayer()">+ 添加伙伴</button>
        </div>

        <!-- 敌人配置 -->
        <div class="custom-battle-section">
          <div class="custom-battle-section-title">
            <span>敌方单位</span>
            <span class="count" id="enemyCount">3/5</span>
          </div>
          <div id="enemyList"></div>
          <button class="custom-battle-add-btn" id="addEnemyBtn" onclick="addCustomEnemy()">+ 添加敌人</button>
          <div class="custom-battle-hint">
            <span>普通</span>: 基础属性 |
            <span>精英</span>: 生命&times;2.5, 攻/防/特攻/特防&times;1.3, 速度不变 |
            <span>首领</span>: 生命&times;8, 攻/特攻&times;1.6, 防/特防&times;1.3, 速度不变
          </div>
        </div>

        <div class="custom-battle-actions">
          <button class="custom-battle-btn secondary" onclick="closeCustomBattleEditor()">取消</button>
          <button class="custom-battle-btn" onclick="applyCustomBattle()">载入战斗</button>
        </div>
      </div>
    </div>

    <div class="turn-info">
      <div class="turn-number" id="turnNumber">第 1 轮</div>
      <div class="phase-text" id="phaseText">己方回合</div>
    </div>

    <div class="action-order-display" id="actionOrderDisplay">
      <div class="action-order-title">行动顺序</div>
      <div class="action-order-list" id="actionOrderList"></div>
    </div>

    <div class="battle-log">
      <div class="log-title">战斗记录</div>
      <div id="logContent"></div>
    </div>

    <div class="battlefield">
      <div class="player-side" id="playerSide"></div>
      <div class="enemy-side" id="enemySide"></div>
    </div>

    <div class="skill-panel" id="skillPanel">
      <div class="action-hint" id="actionHint">点击左侧伙伴选择技能</div>
    </div>

    <div class="command-list" id="commandList">
      <div class="command-title">指令列表（随时下达）</div>
      <div id="commandItems"></div>
    </div>

    <div class="battle-end-overlay" id="battleEndOverlay">
      <div class="end-content">
        <div class="end-title" id="endTitle">胜利</div>
        <button class="restart-btn" onclick="restartBattle()">重新开始</button>
      </div>
    </div>
  </div>

  <script>
    // ==================== 常量配置 ====================
    const MAX_ENERGY = 10;  // 最大能量值

    // 调试开关（生产环境设为 false 可关闭所有调试日志）
    const DEBUG_MODE = false;
    const debugLog = (...args) => { if (DEBUG_MODE) debugLog(...args); };

    // 属性克制表（完整版，包含克制和抗性）
    const TYPE_CHART = {
      grass: { fire: 0.5, water: 2, grass: 0.5, electric: 1, ice: 1, poison: 0.5, rock: 2 },
      fire: { fire: 0.5, water: 0.5, grass: 2, electric: 1, ice: 2, rock: 0.5, psychic: 1, dragon: 1 },
      water: { fire: 2, water: 0.5, grass: 0.5, electric: 0.5, ice: 1, rock: 2, dragon: 1 },
      electric: { fire: 1, water: 2, grass: 0.5, electric: 0.5, ice: 1, rock: 0, dragon: 0.5 },
      ice: { fire: 0.5, water: 0.5, grass: 2, electric: 1, ice: 0.5, rock: 1, dragon: 1 },
      rock: { fire: 2, water: 0.5, grass: 0.5, electric: 1, ice: 2, rock: 1, flying: 2 },
      psychic: { fire: 1, water: 1, grass: 1, electric: 1, ice: 1, psychic: 0.5, dragon: 1 },
      dragon: { fire: 1, water: 1, grass: 1, electric: 1, ice: 1, psychic: 2, dragon: 2 }
    };

    // ==================== 宝可梦风格伤害计算系统 ====================
    // 伤害计算公式参考宝可梦：
    // 伤害 = (等级×2/5 + 2) × 威力 × 攻击/特攻 ÷ 防御/特防 ÷ 50 + 2) × 随机系数(0.85~1.0)
    //      × STAB(1.5) × 属性克制 × 暴击(1.5) × 其他加成

    /**
     * 判断技能是否为物理攻击
     * @param {Object} skill - 技能对象
     * @returns {boolean}
     */
    function isPhysicalSkill(skill) {
      // 物理伤害类型的技能
      if (skill.damageType === 'physical') return true;
      // 已知是物理的技能
      if (skill.type === 'physical') return true;
      // 烈焰拳、火焰冲击等是物理
      if (skill.id === 'flame_punch' || skill.id === 'flame_impact') return true;
      // 技能威力格式是 "25×3" 的多段攻击，检查是否有物理标签
      if (skill.tags && skill.tags.includes('物理伤害')) return true;
      // 默认根据技能ID或类型判断（未来可以扩展）
      return false;
    }

    /**
     * 计算宝可梦风格伤害
     * @param {Object} caster - 施法者
     * @param {Object} target - 目标
     * @param {Object} skill - 技能
     * @param {Object} options - 额外选项 { powerBonus, guaranteedCrit }
     * @returns {Object} { damage, isCrit, typeMultiplier, stabBonus, critBonus }
     */
    function calculatePokemonDamage(caster, target, skill, options = {}) {
      const { powerBonus = 0, guaranteedCrit = false } = options;

      // 1. 确定物理/特殊攻击
      const isPhysical = isPhysicalSkill(skill);
      const attackStat = isPhysical ? (caster.attack || 50) : (caster.spAttack || 50);
      const defenseStat = isPhysical ? (target.defense || 50) : (target.spDefense || 50);

      // 2. 等级
      const level = caster.level || 60;

      // 3. 技能威力（支持多段攻击的总威力）
      let skillPower = skill.power;
      if (typeof skillPower === 'string' && skillPower.includes('×')) {
        // "25×3" 格式转换为总威力
        const parts = skillPower.split('×');
        skillPower = parseInt(parts[0]) * parseInt(parts[1]);
      }
      skillPower = skillPower || 0;

      // 4. 基础伤害 = (((等级×2/5 + 2) × 威力 × 攻击/特攻 ÷ 防御/特防) ÷ 50 + 2)
      const baseDamage = Math.floor((((level * 2 / 5 + 2) * skillPower * attackStat / defenseStat) / 50 + 2));

      // 5. 随机系数 (0.85 ~ 1.0)
      const randomFactor = 0.85 + Math.random() * 0.15;

      // 6. STAB 同属性加成 (Same Type Attack Bonus)
      let stabBonus = 1;
      if (caster.element === skill.element) {
        stabBonus = 1.5;
      }

      // 7. 属性克制倍率
      const typeMultiplier = calculateDamageMultiplier(skill.element, target.element || target.elements);

      // 8. 暴击 (1.5倍，12.5%基础概率)
      let critBonus = 1;
      let isCrit = false;
      const critChance = 0.125; // 12.5%
      if (guaranteedCrit || Math.random() < critChance) {
        critBonus = 1.5;
        isCrit = true;
      }

      // 9. 组合最终伤害
      let damage = Math.floor(baseDamage * randomFactor * stabBonus * typeMultiplier * critBonus);

      // 10. 应用额外威力加成（如蓄焰等）
      if (powerBonus > 0) {
        damage += Math.floor(powerBonus * randomFactor * typeMultiplier);
      }

      // 11. 应用抗性buff
      if (target.resistances && skill.element && target.resistances[skill.element]) {
        const resistValue = target.resistances[skill.element];
        damage = Math.floor(damage * (1 - resistValue));
      }

      return {
        damage,
        isCrit,
        typeMultiplier,
        stabBonus,
        critBonus,
        baseDamage: Math.floor(baseDamage)
      };
    }

    // ==================== 能量消耗配置 ====================
    // 能量消耗设计：威力越高/效果越强，消耗越多
    const ENERGY_COST = {
      tackle: 0,
      low: 1,
      medium: 2,
      high: 3,
      ultra: 4,
      ultimate: 5,
      mega: 6
    };

    // 能量消耗显示文本
    function getEnergyText(cost) {
      if (cost === 0) return '免费';
      return cost + '能量';
    }

    // ==================== 宝可梦风格属性计算系统 ====================
    // 种族值定义（对应宝可梦的 Base Stats）
    // 每种生物都有独立的种族值，通过阵营(side)区分伙伴与敌人

    // 所有生物模板（20种，任何生物都可以作为伙伴或敌人）
    const CREATURE_TEMPLATES = [
      // 火属性
      { id: 'flame_bear', name: '焰爪熊', element: 'fire', style: '爆发流' },
      { id: 'flame_salamander', name: '焰心蜥', element: 'fire', style: '爆发流' },
      { id: 'blaze_beast', name: '炎爆兽', element: 'fire', style: '爆发流' },
      // 水属性
      { id: 'torrent_crab', name: '激流蟹', element: 'water', style: '控制流' },
      { id: 'deep_fish', name: '深海鱼', element: 'water', style: '控制流' },
      // 草属性
      { id: 'vine_turtle', name: '藤蔓龟', element: 'grass', style: '光环流' },
      { id: 'poison_vine', name: '毒藤怪', element: 'grass', style: '光环流' },
      // 电属性
      { id: 'lightning_marten', name: '闪电貂', element: 'electric', style: '多段伤害流' },
      { id: 'thunder_bat', name: '雷鸣蝠', element: 'electric', style: '多段伤害流' },
      // 冰属性
      { id: 'frost_wolf', name: '寒霜狼', element: 'ice', style: '冰霜蓄力流' },
      { id: 'ice_crystal', name: '冰晶魔', element: 'ice', style: '冰霜蓄力流' },
      // 岩石属性
      { id: 'rock_ox', name: '磐石牛', element: 'rock', style: '天气流' },
      { id: 'rock_armadillo', name: '岩甲兽', element: 'rock', style: '天气流' },
      // 超能属性
      { id: 'spirit_fox', name: '灵狐', element: 'psychic', style: '奥秘流' },
      { id: 'dream_butterfly', name: '幻蝶', element: 'psychic', style: '奥秘流' },
      { id: 'mind_master', name: '念力怪', element: 'psychic', style: '奥秘流' },
      { id: 'shadow_panther', name: '暗影豹', element: 'psychic', style: '奥秘流' },
      // 龙属性
      { id: 'star_dragon', name: '星瞳龙', element: 'dragon', style: '血脉压制流' },
      { id: 'young_dragon', name: '幼龙', element: 'dragon', style: '血脉压制流' },
      { id: 'volcano_dragon', name: '火山龙', element: 'dragon', style: '血脉压制流', isBoss: true }
    ];

    // 全部生物的种族值（统一数据源）
    const CREATURE_BASE_STATS = {
      // 火属性
      flame_bear: { hp: 110, attack: 100, defense: 85, spAttack: 75, spDefense: 70, speed: 70 },
      flame_salamander: { hp: 100, attack: 95, defense: 65, spAttack: 85, spDefense: 60, speed: 75 },
      blaze_beast: { hp: 100, attack: 110, defense: 75, spAttack: 95, spDefense: 70, speed: 65 },
      // 水属性
      torrent_crab: { hp: 100, attack: 80, defense: 95, spAttack: 70, spDefense: 85, speed: 60 },
      deep_fish: { hp: 85, attack: 70, defense: 75, spAttack: 90, spDefense: 80, speed: 85 },
      // 草属性
      vine_turtle: { hp: 115, attack: 65, defense: 90, spAttack: 85, spDefense: 80, speed: 55 },
      poison_vine: { hp: 95, attack: 75, defense: 80, spAttack: 85, spDefense: 70, speed: 65 },
      // 电属性
      lightning_marten: { hp: 75, attack: 70, defense: 60, spAttack: 110, spDefense: 65, speed: 120 },
      thunder_bat: { hp: 70, attack: 80, defense: 55, spAttack: 95, spDefense: 60, speed: 110 },
      // 冰属性
      frost_wolf: { hp: 90, attack: 95, defense: 70, spAttack: 60, spDefense: 75, speed: 100 },
      ice_crystal: { hp: 80, attack: 65, defense: 70, spAttack: 100, spDefense: 85, speed: 70 },
      // 岩石属性
      rock_ox: { hp: 130, attack: 90, defense: 110, spAttack: 50, spDefense: 85, speed: 45 },
      rock_armadillo: { hp: 120, attack: 85, defense: 100, spAttack: 50, spDefense: 75, speed: 50 },
      // 超能属性
      spirit_fox: { hp: 80, attack: 55, defense: 70, spAttack: 115, spDefense: 95, speed: 90 },
      dream_butterfly: { hp: 70, attack: 50, defense: 65, spAttack: 100, spDefense: 85, speed: 110 },
      mind_master: { hp: 85, attack: 55, defense: 70, spAttack: 110, spDefense: 90, speed: 95 },
      shadow_panther: { hp: 75, attack: 100, defense: 60, spAttack: 85, spDefense: 70, speed: 115 },
      // 龙属性
      star_dragon: { hp: 95, attack: 85, defense: 75, spAttack: 105, spDefense: 80, speed: 80 },
      young_dragon: { hp: 100, attack: 90, defense: 75, spAttack: 95, spDefense: 80, speed: 75 },
      volcano_dragon: { hp: 110, attack: 105, defense: 80, spAttack: 100, spDefense: 75, speed: 60 }
    };

    // ==================== 宝可梦风格属性计算系统 ====================
    // 简化版属性计算公式（仅种族值 + 等级）：
    // HP = floor(BaseHP × 2 × Level / 30) + Level + 10
    // 其他 = floor(BaseStat × Level / 30) + 5
    // 速度 = BaseSpeed（直接使用种族值，不随等级变化）
    function calculateStats(baseStats, level) {
      return {
        maxHp: Math.floor(baseStats.hp * 2 * level / 30) + level + 10,
        attack: Math.floor(baseStats.attack * level / 30) + 5,
        defense: Math.floor(baseStats.defense * level / 30) + 5,
        spAttack: Math.floor(baseStats.spAttack * level / 30) + 5,
        spDefense: Math.floor(baseStats.spDefense * level / 30) + 5,
        speed: baseStats.speed
      };
    }

    // 根据模板ID和等级获取完整属性
    function getCreatureStats(templateId, level) {
      const baseStats = CREATURE_BASE_STATS[templateId];
      if (!baseStats) {
        // 备用：默认种族值
        const defaultBase = { hp: 65, attack: 65, defense: 65, spAttack: 65, spDefense: 65, speed: 65 };
        return calculateStats(defaultBase, level);
      }
      return calculateStats(baseStats, level);
    }

    // ==================== 玩家单位数据（伙伴）====================
    // 玩家初始配置（用于重置战斗）
    const PLAYER_INITIAL_CONFIG = [
      { id: 'flame_bear', name: '焰爪熊', element: 'fire', level: 60 },
      { id: 'torrent_crab', name: '激流蟹', element: 'water', level: 60 },
      { id: 'vine_turtle', name: '藤蔓龟', element: 'grass', level: 60 }
    ];

    // 根据初始配置创建玩家单位
    function createPlayerUnits() {
      return PLAYER_INITIAL_CONFIG.map(config => {
        const stats = getCreatureStats(config.id, config.level);
        return {
          id: config.id,
          name: config.name,
          element: config.element,
          level: config.level,
          side: 'player',  // 阵营标记：伙伴
          maxHp: stats.maxHp,
          currentHp: stats.maxHp,
          attack: stats.attack,
          spAttack: stats.spAttack,
          defense: stats.defense,
          spDefense: stats.spDefense,
          speed: stats.speed,
          energy: MAX_ENERGY,
          debuffs: [],
          buffs: []
        };
      });
    }

    let playerUnits = createPlayerUnits();

    // ==================== 技能分配规则 ====================
    // 从数组中随机选取n个元素
    function shuffleArray(array) {
      const shuffled = [...array];
      for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }
      return shuffled;
    }

    // 休息技能定义（所有生物都有）
    const REST_SKILL = {
      id: 'rest',
      name: '休息',
      type: 'energy',
      energyCost: 0,
      target: 'self',
      power: 5,  // 回复5点能量
      element: null,
      strategy: 'self',
      effect: 'energy_restore',
      description: '休息恢复，回复5点能量'
    };

    // 根据生物属性，从 skills-data.js 随机获取4个技能
    function assignSkillsByElement(element, creatureId) {
      // 岩石属性映射到地属性（兼容旧数据）
      const elementMap = { rock: 'ground' };
      const mappedElement = elementMap[element] || element;
      
      const elementData = SKILLS_DB[mappedElement];
      if (!elementData) return [];

      const skills = [];

      // 休息技能始终在最左边
      skills.push({ ...REST_SKILL });

      // 从各类别中随机选取：攻击2个 + 防御1个 + 辅助1个 = 共4个
      // 攻击技能池
      if (elementData.attack && elementData.attack.length > 0) {
        const attackPool = shuffleArray(elementData.attack);
        const numAttack = Math.min(2, attackPool.length);
        for (let i = 0; i < numAttack; i++) {
          skills.push(convertSkillToBattleFormat(attackPool[i], mappedElement));
        }
      }

      // 防御技能池
      if (elementData.defense && elementData.defense.length > 0) {
        const defPool = shuffleArray(elementData.defense);
        skills.push(convertSkillToBattleFormat(defPool[0], mappedElement));
      }

      // 辅助技能池
      if (elementData.support && elementData.support.length > 0) {
        const supPool = shuffleArray(elementData.support);
        skills.push(convertSkillToBattleFormat(supPool[0], mappedElement));
      }

      return skills;
    }

    // 状态效果映射表 - 根据 statusId 映射到战斗系统格式
    const STATUS_EFFECT_MAP = {
      'burn': { effect: 'burn', burnStacks: 5, burnChance: null },
      'burn_mark': { effect: 'burnMark', burnMarkPower: 40 },
      'flow': { flowEffect: true, speedBoost: 1, duration: 2 },
      'clear_spring': { clearSpringEffect: true, clearSpringDuration: 3 },
      'water_soak': { waterSoakEffect: true, waterSoakPower: 1, waterSoakDuration: 2, waterSoakMaxStacks: 6 },
      'muddy': { muddyEffect: true, muddyMaxStacks: 3 },
      'paralysis': { effect: 'paralyze' },
      'confusion': { effect: 'confuse' },
      'frozen': { effect: 'freeze' },
      'wither': { wither: true, witherPower: 10 },
      'fire_shield': { type: 'shield', damageReduction: 0.55 },
      'rainy_day': { rainyDayEffect: true, rainyDayDuration: 3, rainyDayPowerBoost: 0.5 },
      'fragrant_environment': { effect: 'fragrantEnvironment' },
      'parasitic_seed': { parasiticSeed: true, parasiticSeedDrain: 0.06, parasiticSeedTurns: 4 },
      'counter_stance': { effect: 'counterStance', reflectDamage: 0.6 },
      'weakness': { weaknessEffect: true, weaknessDuration: 2 },
      'light_gather': { lightGather: 1 },
      'root_bound': { effect: 'rootBound' },
      'entangle': { effect: 'entangle' },
      'slow': { effect: 'slow' },
      'burn_mark_custom': { effect: 'burnMark', burnMarkPower: 40 }
    };

    // 根据 statusId 获取状态效果配置
    function getStatusEffectConfig(statusId) {
      return STATUS_EFFECT_MAP[statusId] || null;
    }

    // 应用 add_status 效果的辅助函数
    function applyAddStatusEffect(effectData) {
      const result = {};
      const statusId = effectData.statusId;
      const stacks = effectData.stacks || 1;
      const duration = effectData.duration || 2;
      const chance = effectData.chance || 1; // 默认100%概率

      const statusConfig = getStatusEffectConfig(statusId);
      if (!statusConfig) {
        console.warn(`未找到状态配置: ${statusId}`);
        return result;
      }

      // 合并状态配置
      Object.assign(result, statusConfig);

      // 处理可变参数
      if (effectData.stacks !== undefined) {
        if (statusConfig.burnStacks !== undefined) {
          result.burnStacks = effectData.stacks;
        }
        if (statusConfig.waterSoakEffect) {
          result.waterSoakPower = effectData.stacks;
        }
      }

      if (effectData.damage !== undefined) {
        if (statusConfig.burnMarkPower !== undefined) {
          result.burnMarkPower = effectData.damage;
        }
        if (statusConfig.witherPower !== undefined) {
          result.witherPower = effectData.damage;
        }
      }

      if (effectData.percent !== undefined) {
        if (statusConfig.parasiticSeed) {
          result.parasiticSeedDrain = effectData.percent / 100;
        }
        if (statusConfig.clearSpringEffect) {
          result.healPercent = effectData.percent / 100;
        }
      }

      // 设置概率（如果有）
      if (effectData.chance !== undefined && effectData.chance < 1) {
        if (statusConfig.burnStacks !== undefined) {
          result.burnChance = effectData.chance;
        }
      }

      return result;
    }

    // 解析 effects 数组中的单个效果
    function parseSingleEffect(effect) {
      const result = {};

      switch (effect.type) {
        case 'damage':
          // 伤害效果：{ type: 'damage', power: 80, damageType: 'special' }
          if (effect.power !== undefined) {
            result.power = effect.power;
            if (effect.damageType === 'physical') {
              result.type = 'physical';
            } else if (effect.damageType === 'special') {
              result.type = 'special';
            }
          }
          if (effect.comboHits !== undefined) {
            result.comboHits = effect.comboHits;
            result.comboPower = effect.power;
            result.power = effect.power * effect.comboHits;
          }
          break;

        case 'heal':
          // 治疗效果：{ type: 'heal', percent: 15 }
          result.healPercent = (effect.percent || 0) / 100;
          result.type = 'heal';
          break;

        case 'shield':
          // 护盾/减伤效果：{ type: 'shield', reduction: 0.55 }
          result.type = 'shield';
          if (effect.reduction !== undefined) {
            result.damageReduction = effect.reduction;
          }
          break;

        case 'add_status':
          // 添加状态：{ type: 'add_status', statusId: 'burn', stacks: 5 }
          Object.assign(result, applyAddStatusEffect(effect));
          break;

        case 'buff':
          // 属性提升：{ type: 'buff', stat: 'attack', value: 1 }
          if (effect.stats) {
            // 批量属性提升
            if (effect.stats.attack !== undefined) result.attackBoost = effect.stats.attack;
            if (effect.stats.spAtk !== undefined) result.spAtkBoost = effect.stats.spAtk;
            if (effect.stats.speed !== undefined) result.speedBoost = effect.stats.speed;
            if (effect.stats.defense !== undefined) result.defenseBoost = effect.stats.defense;
          }
          if (effect.attack !== undefined) result.attackBoost = effect.attack;
          if (effect.spAtk !== undefined) result.spAtkBoost = effect.spAtk;
          if (effect.speed !== undefined) result.speedBoost = effect.speed;
          if (effect.defense !== undefined) result.defenseBoost = effect.defense;
          break;

        case 'debuff':
          // 属性降低（对敌人）
          if (effect.stats) {
            if (effect.stats.attack !== undefined) result.enemyAttackDebuff = effect.stats.attack;
            if (effect.stats.speed !== undefined) result.enemySpeedDebuff = effect.stats.speed;
            if (effect.stats.accuracy !== undefined) result.enemyAccuracyDebuff = effect.stats.accuracy;
          }
          break;

        case 'buff_all':
          // 全队属性提升：{ type: 'buff_all', stats: { attack: 1, speed: 1 } }
          if (effect.stats) {
            if (effect.stats.attack !== undefined) result.attackBoost = effect.stats.attack;
            if (effect.stats.spAtk !== undefined) result.spAtkBoost = effect.stats.spAtk;
            if (effect.stats.speed !== undefined) result.speedBoost = effect.stats.speed;
            if (effect.stats.defense !== undefined) result.defenseBoost = effect.stats.defense;
          }
          // 属性伤害加成
          if (effect.fireDamageBoost !== undefined) result.fireDamageBoost = effect.fireDamageBoost;
          if (effect.grassDamageBoost !== undefined) result.grassDamageBoost = effect.grassDamageBoost;
          if (effect.waterDamageBoost !== undefined) result.waterDamageBoost = effect.waterDamageBoost;
          break;

        case 'clear_buff':
          // 清除增益
          result.clearBuff = true;
          break;

        case 'add_fire_power':
          // 火属性攻击威力加成
          result.addFirePower = effect.value || 0;
          break;

        case 'light_gather':
          // 光能汇聚
          result.lightGather = effect.stacks || 1;
          break;

        case 'wither':
          // 枯萎效果
          result.wither = true;
          result.witherPower = effect.power || 10;
          break;

        case 'crit_guarantee':
          // 必定暴击
          result.guaranteedCrit = true;
          break;

        case 'drowning':
          // 溺水效果
          result.drowningEffect = true;
          result.drowningDuration = effect.duration || 3;
          break;

        case 'clear_debuff':
          // 清除负面状态
          result.clearDebuff = true;
          break;

        case 'energy_restore':
          // 回复能量
          result.energyRestore = effect.value || 0;
          break;

        case 'multi_hit':
          // 多段攻击：{ type: 'multi_hit', hits: 3, damage: 25, burnChance: 0.5, burnStacks: 2 }
          result.comboHits = effect.hits || 3;
          result.comboPower = effect.damage || 25;
          result.power = result.comboHits * result.comboPower;
          if (effect.burnChance !== undefined) {
            result.burnChance = effect.burnChance;
          }
          if (effect.burnStacks !== undefined) {
            result.burnStacks = effect.burnStacks;
          }
          if (effect.alwaysBurn) {
            result.burnChance = 1;
            result.burnStacks = effect.burnStacks || 1;
          }
          break;

        case 'self_debuff':
          // 自我弱化（使用后自身获得debuff）
          if (effect.statusId === 'weakness') {
            result.weaknessEffect = true;
          }
          if (effect.stats) {
            // 解析属性降低
            if (effect.stats.attack !== undefined) result.attackBoost = -Math.abs(effect.stats.attack);
            if (effect.stats.spAtk !== undefined) result.spAtkBoost = -Math.abs(effect.stats.spAtk);
          }
          break;

        default:
          console.warn(`未知的效果类型: ${effect.type}`);
      }

      return result;
    }

    // 将 skills-data.js 中的技能格式转换为战斗系统格式（新版 - 从 effects 数组解析）
    function convertSkillToBattleFormat(skillData, element) {
      // 获取能量消耗
      let energyCost = ENERGY_COST.medium;
      if (skillData.e !== undefined) {
        if (typeof skillData.e === 'number') {
          if (skillData.e <= 1) energyCost = ENERGY_COST.low;
          else if (skillData.e <= 2) energyCost = ENERGY_COST.medium;
          else if (skillData.e <= 3) energyCost = ENERGY_COST.high;
          else if (skillData.e <= 4) energyCost = ENERGY_COST.ultra;
          else energyCost = ENERGY_COST.ultimate;
        }
      }

      // 获取目标类型 - 支持新英文格式和旧中文格式
      let target = 'single_enemy';
      if (skillData.t) {
        const targetStr = String(skillData.t);
        // 新英文格式
        if (targetStr.includes('self')) target = 'self';
        else if (targetStr.includes('all_ally')) target = 'all_ally';
        else if (targetStr.includes('ally')) target = 'ally';
        else if (targetStr.includes('all_enemy')) target = 'all_enemy';
        // 旧中文格式
        else if (targetStr.includes('自身')) target = 'self';
        else if (targetStr.includes('己方全体')) target = 'all_ally';
        else if (targetStr.includes('己方单体')) target = 'ally';
        else if (targetStr.includes('敌方全体') || targetStr.includes('全体敌人')) target = 'all_enemy';
        // 兼容 all 格式
        else if (targetStr.includes('all')) target = 'all_enemy';
        else target = 'single_enemy';
      }

      // 判断技能类型
      let type = 'special';
      if (skillData.damageType) {
        if (skillData.damageType === '物理') type = 'physical';
        else if (skillData.damageType === '特攻') type = 'special';
      }

      // 获取威力
      let power = 0;
      let comboHits = 1;
      let comboPower = 0;
      let basePower = 0;
      let powerPerStack = 0;
      if (skillData.p !== undefined) {
        if (typeof skillData.p === 'number') {
          power = skillData.p;
          basePower = skillData.p;
        } else if (typeof skillData.p === 'string') {
          // 处理多段攻击格式 "25×3"
          const comboMatch = skillData.p.match(/(\d+)\s*[×x×]\s*(\d+)/);
          if (comboMatch) {
            comboPower = parseInt(comboMatch[1]);
            comboHits = parseInt(comboMatch[2]);
            power = comboPower * comboHits;
            basePower = comboPower;
          } else {
            // 处理动态威力格式 "100+60×层"
            const dynamicMatch = skillData.p.match(/(\d+)\+(\d+)\s*[×x×]\s*层/);
            if (dynamicMatch) {
              basePower = parseInt(dynamicMatch[1]);
              powerPerStack = parseInt(dynamicMatch[2]);
              power = basePower;

      }

      // 初始化所有效果变量
      let attackBoost = 0;
      let spAtkBoost = 0;
      let speedBoost = 0;
      let defenseBoost = 0;
      let fireDamageBoost = 0;
      let grassDamageBoost = 0;
      let clearBuff = false;
      let addFirePower = 0;
      let lightGather = 0;
      let wither = false;
      let witherPower = 0;
      let guaranteedCrit = false;
      let reflectDamage = 0;
      let parasiticSeed = false;
      let parasiticSeedDrain = 0;
      let parasiticSeedTurns = 0;
      let energyRestore = 0;
      let healPercent = 0;
      let waterSoakEffect = false;
      let waterSoakPower = 0;
      let waterSoakDuration = 2;
      let waterSoakMaxStacks = 6;
      let drowningEffect = false;
      let drowningDuration = 3;
      let weaknessEffect = false;
      let weaknessDuration = 2;
      let muddyEffect = false;
      let muddyMaxStacks = 3;
      let flowEffect = false;
      let clearSpringEffect = false;
      let clearSpringDuration = 3;
      let rainyDayEffect = false;
      let rainyDayDuration = 3;
      let rainyDayPowerBoost = 0.5;
      let steamBurnChance = 0;

      let damageReduction = skillData.damageReduction || 0;

      // ========== 优先从 effects 数组解析（新格式） ==========
      if (skillData.effects && Array.isArray(skillData.effects)) {

          Object.assign(

          // 逐个赋值以确保变量更新
          if (parsed.attackBoost !== undefined) attackBoost = parsed.attackBoost;
          if (parsed.spAtkBoost !== undefined) spAtkBoost = parsed.spAtkBoost;
          if (parsed.speedBoost !== undefined) speedBoost = parsed.speedBoost;
          if (parsed.defenseBoost !== undefined) defenseBoost = parsed.defenseBoost;
          if (parsed.fireDamageBoost !== undefined) fireDamageBoost = parsed.fireDamageBoost;
          if (parsed.grassDamageBoost !== undefined) grassDamageBoost = parsed.grassDamageBoost;
          if (parsed.clearBuff !== undefined) clearBuff = parsed.clearBuff;
          if (parsed.addFirePower !== undefined) addFirePower = parsed.addFirePower;
          if (parsed.lightGather !== undefined) lightGather = parsed.lightGather;
          if (parsed.wither !== undefined) wither = parsed.wither;
          if (parsed.witherPower !== undefined) witherPower = parsed.witherPower;
          if (parsed.guaranteedCrit !== undefined) guaranteedCrit = parsed.guaranteedCrit;
          if (parsed.reflectDamage !== undefined) reflectDamage = parsed.reflectDamage;
          if (parsed.parasiticSeed !== undefined) parasiticSeed = parsed.parasiticSeed;
          if (parsed.parasiticSeedDrain !== undefined) parasiticSeedDrain = parsed.parasiticSeedDrain;
          if (parsed.parasiticSeedTurns !== undefined) parasiticSeedTurns = parsed.parasiticSeedTurns;
          if (parsed.energyRestore !== undefined) energyRestore = parsed.energyRestore;
          if (parsed.healPercent !== undefined) healPercent = parsed.healPercent;
          if (parsed.waterSoakEffect !== undefined) waterSoakEffect = parsed.waterSoakEffect;
          if (parsed.waterSoakPower !== undefined) waterSoakPower = parsed.waterSoakPower;
          if (parsed.waterSoakDuration !== undefined) waterSoakDuration = parsed.waterSoakDuration;
          if (parsed.waterSoakMaxStacks !== undefined) waterSoakMaxStacks = parsed.waterSoakMaxStacks;
          if (parsed.drowningEffect !== undefined) drowningEffect = parsed.drowningEffect;
          if (parsed.drowningDuration !== undefined) drowningDuration = parsed.drowningDuration;
          if (parsed.weaknessEffect !== undefined) weaknessEffect = parsed.weaknessEffect;
          if (parsed.weaknessDuration !== undefined) weaknessDuration = parsed.weaknessDuration;
          if (parsed.muddyEffect !== undefined) muddyEffect = parsed.muddyEffect;
          if (parsed.muddyMaxStacks !== undefined) muddyMaxStacks = parsed.muddyMaxStacks;
          if (parsed.flowEffect !== undefined) flowEffect = parsed.flowEffect;
          if (parsed.clearSpringEffect !== undefined) clearSpringEffect = parsed.clearSpringEffect;
          if (parsed.clearSpringDuration !== undefined) clearSpringDuration = parsed.clearSpringDuration;
          if (parsed.rainyDayEffect !== undefined) rainyDayEffect = parsed.rainyDayEffect;
          if (parsed.rainyDayDuration !== undefined) rainyDayDuration = parsed.rainyDayDuration;
          if (parsed.rainyDayPowerBoost !== undefined) rainyDayPowerBoost = parsed.rainyDayPowerBoost;
          if (parsed.steamBurnChance !== undefined) steamBurnChance = parsed.steamBurnChance;
          if (parsed.effect !== undefined) effect = parsed.effect;
          if (parsed.burnStacks !== undefined) burnStacks = parsed.burnStacks;
          if (parsed.burnChance !== undefined) burnChance = parsed.burnChance;
          if (parsed.burnMarkPower !== undefined) burnMarkPower = parsed.burnMarkPower;
          if (parsed.type !== undefined) type = parsed.type;
          if (parsed.damageReduction !== undefined) damageReduction = parsed.damageReduction;
          if (parsed.comboHits !== undefined) comboHits = parsed.comboHits;
          if (parsed.comboPower !== undefined) comboPower = parsed.comboPower;
          if (parsed.power !== undefined) power = parsed.power;
        }
      } else if (skillData.eff) {
        // ========== 兼容旧格式：使用正则解析 eff 文本 ==========
        // 解析攻击+1级

        // 解析特攻+1级
        if (skillData.eff.includes('特攻+1级') || skillData.eff.includes('特攻-')) {

        }
        // 蒸汽灼伤概率
        if (skillData.eff.includes('蒸汽灼伤') || skillData.eff.includes('灼烧')) {
          const steamBurnMatch = skillData.eff.match(/(\d+)%概率.*灼伤/);
          if (steamBurnMatch) {
            steamBurnChance = parseInt(steamBurnMatch[1]) / 100;
          } else if (skillData.eff.includes('蒸汽灼伤')) {
            steamBurnChance = 0.3;
          }
        }
        // 持续治疗百分比
        if (skillData.eff.includes('每回合回复')) {
          const healPercentMatch = skillData.eff.match(/每回合回复(\d+)%/);
          if (healPercentMatch) {
            healPercent = parseInt(healPercentMatch[1]) / 100;
          }
        }
        // 持续治疗
        if (skillData.eff.includes('最大HP的')) {
          const hpHealMatch = skillData.eff.match(/最大HP的(\d+)%/);
          if (hpHealMatch) {
            healPercent = parseInt(hpHealMatch[1]) / 100;
          }
        } else if (skillData.eff.includes('恢复') && skillData.eff.includes('%HP')) {
          const restoreMatch = skillData.eff.match(/恢复(\d+)%HP/);
          if (restoreMatch) {
            healPercent = parseInt(restoreMatch[1]) / 100;
          }
        }
        // 根据 eff 判断技能类型
        if (skillData.eff.includes('护盾') || skillData.eff.includes('减伤')) {
          type = 'shield';
        }
        if (skillData.eff.includes('治疗') || skillData.eff.includes('回复')) {
          type = 'heal';
        }
      }

      return {
        id: skillData.id,
        name: skillData.name,
        type: type,
        energyCost: energyCost,
        target: target,
        power: power,
        basePower: basePower,
        powerPerStack: powerPerStack,
        comboHits: comboHits > 1 ? comboHits : undefined,
        comboPower: comboPower > 0 ? comboPower : undefined,
        element: element,
        strategy: 'counter_first',
        effect: effect,
        burnStacks: burnStacks,
        burnChance: burnChance,
        burnMarkPower: burnMarkPower,
        damageReduction: damageReduction,
        attackBoost: attackBoost,

    // ==================== 统一技能效果执行系统 ====================

    // 添加状态到单位
    function addStatusToUnit(unit, statusId, stacks, duration) {
      unit.buffs = unit.buffs || [];
      const statusDef = STATUS[statusId];
      if (!statusDef) {
        console.warn(`未知状态: ${statusId}`);
        return null;
      }

      // 查找是否已有该状态
      let existingBuff = unit.buffs.find(b => b.type === statusId);

      if (existingBuff) {
        // 可叠加状态
        if (statusDef.stackable) {
          existingBuff.stacks = Math.min(existingBuff.stacks + (stacks || 1), statusDef.maxStacks || 99);
        }
        existingBuff.remainingDuration = duration || statusDef.duration || 2;
      } else {
        // 新增状态
        const buff = {
          type: statusId,
          name: statusDef.name || statusId,
          remainingDuration: duration || statusDef.duration || 2,
          stacks: (statusDef.stackable) ? (stacks || 1) : 1
        };

        // 复制状态属性
        if (statusDef.stats) {
          if (statusDef.stats.attack) buff.attackBoost = statusDef.stats.attack;
          if (statusDef.stats.spAtk) buff.spAtkBoost = statusDef.stats.spAtk;
          if (statusDef.stats.speed) buff.speedBoost = statusDef.stats.speed;
          if (statusDef.stats.defense) buff.defenseBoost = statusDef.stats.defense;
        }
        if (statusDef.healPercent) buff.healPercent = statusDef.healPercent;
        if (statusDef.damageReduction) buff.damageReduction = statusDef.damageReduction;
        if (statusDef.reflectDamage) buff.reflectDamage = statusDef.reflectDamage;
        if (statusDef.skipTurn) buff.skipTurn = true;
        if (statusDef.skipTurnChance) buff.skipTurnChance = statusDef.skipTurnChance;
        if (statusDef.selfAttackChance) buff.selfAttackChance = statusDef.selfAttackChance;
        if (statusDef.healBlock) buff.healBlock = true;

        unit.buffs.push(buff);
      }

      return existingBuff || unit.buffs[unit.buffs.length - 1];
    }

    // 添加属性提升buff
    function addBuffToUnit(unit, stat, value, duration) {
      unit.buffs = unit.buffs || [];

      const buff = {
        type: 'buff',
        stat: stat,
        value: value,
        remainingDuration: duration || 2
      };

      unit.buffs.push(buff);
      return buff;
    }

    // 执行技能效果（基于 effects 数组）
    function executeSkillEffects(skill, caster, targets) {
      if (!skill.effects || !Array.isArray(skill.effects)) return;

      const results = [];

      skill.effects.forEach(effect => {
        switch(effect.type) {
          case 'add_status':
            const statusId = effect.statusId;
            targets.forEach(target => {
              if (target.currentHp <= 0) return;
              const duration = effect.duration || STATUS[statusId]?.duration || 2;
              const stacks = effect.stacks || 1;
              addStatusToUnit(target, statusId, stacks, duration);
              addLog(`${target.name} 获得「${STATUS[statusId]?.name || statusId}」状态！`, 'buff');
            });
            break;

          case 'buff':
          case 'buff_all':
            const buffDuration = skill.duration || 2;
            targets.forEach(target => {
              if (target.currentHp <= 0) return;
              if (effect.stats) {
                if (effect.stats.attack) addBuffToUnit(target, 'attack', effect.stats.attack, buffDuration);
                if (effect.stats.spAtk) addBuffToUnit(target, 'spAtk', effect.stats.spAtk, buffDuration);
                if (effect.stats.speed) addBuffToUnit(target, 'speed', effect.stats.speed, buffDuration);
                if (effect.stats.defense) addBuffToUnit(target, 'defense', effect.stats.defense, buffDuration);
              }
            });
            // 记录属性伤害加成
            if (effect.fireDamageBoost) caster.fireDamageBoost = (caster.fireDamageBoost || 0) + effect.fireDamageBoost;
            if (effect.grassDamageBoost) caster.grassDamageBoost = (caster.grassDamageBoost || 0) + effect.grassDamageBoost;
            break;

          case 'debuff':
            targets.forEach(target => {
              if (target.currentHp <= 0) return;
              if (effect.stats) {
                if (effect.stats.attack) addBuffToUnit(target, 'attack', effect.stats.attack, skill.duration || 2);
                if (effect.stats.speed) addBuffToUnit(target, 'speed', effect.stats.speed, skill.duration || 2);
                if (effect.stats.accuracy) addBuffToUnit(target, 'accuracy', effect.stats.accuracy, skill.duration || 2);
              }
            });
            break;

          case 'self_debuff':
            if (effect.statusId === 'weakness') {
              addStatusToUnit(caster, 'weakness', 1, 1);
              addLog(`${caster.name} 陷入「虚弱」状态！`, 'debuff');
            }
            break;

          case 'energy_gain':
            targets.forEach(target => {
              const oldEnergy = target.energy;
              target.energy = Math.min(target.energy + effect.amount, MAX_ENERGY);
              const actual = target.energy - oldEnergy;
              if (actual > 0) {
                addLog(`${target.name} 回复 ${actual} 点能量`, 'buff');
              }
            });
            break;

          case 'remove_buff':
            targets.forEach(target => {
              if (target.buffs && target.buffs.length > 0) {
                const removed = target.buffs.pop();
                addLog(`${target.name} 的「${removed.name || removed.type}」被清除！`, 'info');
              }
            });
            break;

          case 'remove_debuff_all':
            targets.forEach(target => {
              if (target.debuffs && target.debuffs.length > 0) {
                target.debuffs = [];
                addLog(`${target.name} 的所有负面状态被清除！`, 'buff');
              }
            });
            break;
        }
      });

      return results;
    }

    // 获取目标的辅助函数
    function getTargets(caster, skill, allPlayerUnits, allEnemyUnits) {
      let targets = [];

      switch(skill.target) {
        case 'single_enemy':
          // 需要指定目标
          return null;
        case 'ally':
          targets = allPlayerUnits.filter(u => u.currentHp > 0);
          if (targets.length > 0) {
            targets = [targets[Math.floor(Math.random() * targets.length)]];
          }
          break;
        case 'all_ally':
          targets = allPlayerUnits.filter(u => u.currentHp > 0);
          break;
        case 'all_enemy':
          targets = allEnemyUnits.filter(u => u.currentHp > 0);
          break;
        case 'self':
          targets = [caster];
          break;
      }

      return targets;
    }

    // 从 effects 数组生成技能描述
    function generateSkillDescription(effects, skillData) {
      if (!effects || effects.length === 0) return '';

      const parts = [];

      effects.forEach(effect => {
        switch(effect.type) {
          case 'damage':
            if (effect.power) parts.push(`威力${effect.power}`);
            if (effect.physical) parts.push('物理');
            break;
          case 'damage_all':
            parts.push(`全体威力${effect.power || '?'}`);
            break;
          case 'multi_hit':
            parts.push(`${effect.damage || '?'}×${effect.hits || '?'}`);
            if (effect.burnChance) parts.push(`${Math.round(effect.burnChance * 100)}%灼烧`);
            break;
          case 'heal':
            parts.push(`回复${effect.percent}%HP`);
            break;
          case 'shield':
            parts.push(`减伤${Math.round((1 - (effect.reduction || 0)) * 100)}%`);
            break;
          case 'add_status':
            const statusName = STATUS[effect.statusId]?.name || effect.statusId;
            if (effect.stacks) parts.push(`+${statusName}(${effect.stacks}层)`);
            else parts.push(`+${statusName}`);
            break;
          case 'buff':
          case 'buff_all':
            if (effect.stats) {
              const boosts = [];
              if (effect.stats.attack > 0) boosts.push(`攻击+${effect.stats.attack}`);
              if (effect.stats.spAtk > 0) boosts.push(`特攻+${effect.stats.spAtk}`);
              if (effect.stats.speed > 0) boosts.push(`速度+${effect.stats.speed}`);
              if (effect.stats.defense > 0) boosts.push(`防御+${effect.stats.defense}`);
              if (boosts.length) parts.push(boosts.join(','));
            }
            if (effect.fireDamageBoost) parts.push(`火属性伤害+${Math.round(effect.fireDamageBoost * 100)}%`);
            if (effect.grassDamageBoost) parts.push(`草属性伤害+${Math.round(effect.grassDamageBoost * 100)}%`);
            break;
          case 'debuff':
            if (effect.stats) {
              if (effect.stats.accuracy) parts.push(`命中-${effect.stats.accuracy}`);
              if (effect.stats.speed) parts.push(`速度-${effect.stats.speed}`);
            }
            break;
          case 'self_debuff':
            parts.push('使用后自身弱化');
            break;
          case 'energy_gain':
            parts.push(`+${effect.amount}能量`);
            break;
          case 'clear_buff':
            parts.push('清除增益');
            break;
          case 'clear_debuff':
            parts.push('清除减益');
            break;
          case 'delayed_damage':
            parts.push(`${effect.turns}回合后${effect.damage}威力伤害`);
            break;
        }
      });

      // 添加持续时间
      if (skillData.duration) {
        parts.push(`持续${skillData.duration}回合`);
      }

      return parts.join(' | ');
    }

                    skill.description = generateSkillDescription(skillData.effects, skillData);
                  }
                }

          });
        });
      }

    // 检查属性克制
    function isCounter(attackElement, defenseElement) {
      const multiplier = TYPE_CHART[attackElement]?.[defenseElement];
      return multiplier === 2;
    }

    // 策略系统
    const strategies = {
      // 攻击技能策略：优先克制属性，次选血量最低
      counter_first: (skill, enemies) => {
        const alive = enemies.filter(e => e.currentHp > 0);
        if (alive.length === 0) return null;
        // 1. 优先克制属性
        const counter = alive.filter(e => isCounter(skill.element, e.element));
        if (counter.length > 0) {
          return counter[Math.floor(Math.random() * counter.length)].id;
        }
        // 2. 血量最低
        alive.sort((a, b) => a.currentHp - b.currentHp);
        return alive[0].id;
      },

      // 治疗技能策略：优先血量百分比最低
      lowest_hp: (skill, allies) => {
        const wounded = allies.filter(a => a.currentHp > 0 && a.currentHp < a.maxHp);
        if (wounded.length === 0) wounded = allies.filter(a => a.currentHp > 0);
        if (wounded.length === 0) return null;
        // 优先血量百分比最低
        wounded.sort((a, b) => (a.currentHp / a.maxHp) - (b.currentHp / b.maxHp));
        return wounded[0].id;
      },

      // 护盾策略：优先低血量百分比友方
      shield_lowest: (skill, allies) => {
        const alive = allies.filter(a => a.currentHp > 0);
        if (alive.length === 0) return null;
        alive.sort((a, b) => (a.currentHp / a.maxHp) - (b.currentHp / b.maxHp));
        return alive[0].id;
      },

      // 默认策略：随机选择
      random: (skill, targets) => {
        const alive = targets.filter(t => t.currentHp > 0);
        if (alive.length === 0) return null;
        return alive[Math.floor(Math.random() * alive.length)].id;
      }
    };

    // 根据策略获取目标
    function resolveTarget(skill, validTargets) {
      const strategyName = skill.strategy || 'random';
      const strategyFn = strategies[strategyName] || strategies.random;
      return strategyFn(skill, validTargets);
    }

      const cmd = playerCommands.find(c => c.casterId === casterId && c.status === 'pending');
      if (cmd && cmd.energySpent !== undefined) {
        const caster = playerUnits.find(p => p.id === casterId);
        if (caster) {
          caster.energy += cmd.energySpent;
          addLog(`${caster.name} 取消指令：恢复${cmd.energySpent}能量（${caster.energy - cmd.energySpent}→${caster.energy}）`);
        }
      }
      playerCommands = playerCommands.filter(c => c.casterId !== casterId);
      renderPlayerUnits();
      renderCommandList();
      updateTurnDisplay();
    }

    function getIntentText(type) {
      const map = { attack: '攻击', buff: '强化', heal: '治疗', defend: '防御' };
      return map[type] || type;
    }

    function addLog(text, type = '') {
      const content = document.getElementById('logContent');
      const entry = document.createElement('div');
      entry.className = 'log-entry ' + type;
      entry.textContent = text;
      content.insertBefore(entry, content.firstChild);
      if (content.children.length > 20) content.removeChild(content.lastChild);
    }

    function updateHpBar(unit) {
      const el = document.getElementById(unit.id);
      if (!el) return;
      const bar = el.querySelector('.hp-bar');
      const text = el.querySelector('.hp-text');
      const percent = (unit.currentHp / unit.maxHp) * 100;
      bar.style.width = percent + '%';
      text.textContent = unit.currentHp + ' / ' + unit.maxHp;
      bar.classList.remove('low', 'critical');
      if (percent <= 25) bar.classList.add('critical');
      else if (percent <= 50) bar.classList.add('low');
    }

    // ==================== 战斗模式切换系统 ====================

    // 切换战斗模式
    function switchBattleMode(mode) {
      if (isRoundExecuting || isExecuting) {
        addLog('战斗进行中，无法切换模式');
        return;
      }

      // 更新按钮状态
      document.querySelectorAll('.mode-switch-btn').forEach(btn => btn.classList.remove('active'));
      document.getElementById('mode' + mode + 'Btn').classList.add('active');

      // 重置战斗状态
      restartBattleForModeSwitch();

      currentBattleMode = mode;
      addLog('切换至' + getModeName(mode));

      // 根据模式更新UI
      updateTurnDisplay();
      renderPlayerUnits();
      renderEnemyUnits();
      renderCommandList();

      // 模式2需要进入准备阶段，模式3在点击时初始化
      if (mode === 2) {
        isPreparing = true;
      }

      // 模式2和模式3需要显示行动顺序面板
      if (mode === 2 || mode === 3) {
        document.getElementById('actionOrderDisplay').classList.add('visible');

        // 模式3：预先生成行动顺序内容
        if (mode === 3) {
          const playerQueue = playerUnits.filter(p => p.currentHp > 0).map(player => ({
            id: player.id,
            type: 'player',
            caster: player,
            speed: player.speed
          }));
          const enemyQueue = enemyUnits.filter(e => e.currentHp > 0).map(enemy => ({
            id: enemy.id,
            type: 'enemy',
            caster: enemy,
            speed: enemy.speed
          }));
          const allActions = [...playerQueue, ...enemyQueue].sort((a, b) => b.speed - a.speed);
          if (allActions.length > 0) {
            showActionOrder(allActions);
          }
        }
      }
    }

    // ==================== 自定义战斗配置系统 ====================

    // 等级范围
    const MIN_LEVEL = 1;
    const MAX_LEVEL = 60;

    // 敌人类型配置
    const ENEMY_TYPE_CONFIG = {
      normal: { name: '普通', hpMult: 1, atkMult: 1, defMult: 1, spAtkMult: 1, spDefMult: 1, speedMult: 1, cssClass: 'normal' },
      elite: { name: '精英', hpMult: 2.5, atkMult: 1.3, defMult: 1.3, spAtkMult: 1.3, spDefMult: 1.3, speedMult: 1, cssClass: 'elite' },
      boss: { name: '首领', hpMult: 8, atkMult: 1.6, defMult: 1.3, spAtkMult: 1.6, spDefMult: 1.3, speedMult: 1, cssClass: 'boss' }
    };

    // 自定义配置状态
    let customPlayerConfig = [];
    let customEnemyConfig = [];

    // 打开自定义战斗编辑器
    function openCustomBattleEditor() {
      // 同步当前模式到面板
      selectCustomMode(currentBattleMode);

      // 初始化配置（基于当前战斗配置）
      customPlayerConfig = playerUnits.map(p => ({
        templateId: p.id,
        name: p.name,
        element: p.element,
        level: p.level
      }));

      customEnemyConfig = enemyUnits.map(e => {
        // 根据敌人的属性倍率反推敌人类型
        let enemyType = 'normal';
        if (e.enemyType) {
          enemyType = e.enemyType;
        } else {
          // 根据HP判断（精英约2.5倍，首领约8倍）
          const baseStats = CREATURE_BASE_STATS[e.templateId] || { hp: 60 };
          const baseHp = Math.floor(baseStats.hp * 2 * e.level / 30) + e.level + 10;
          if (e.maxHp >= baseHp * 6) {
            enemyType = 'boss';
          } else if (e.maxHp >= baseHp * 2) {
            enemyType = 'elite';
          }
        }
        return {
          templateId: e.templateId,
          name: e.name,
          element: e.element,
          level: e.level,
          enemyType: enemyType
        };
      });

      renderCustomEditor();
      document.getElementById('customBattleOverlay').classList.add('visible');
    }

    // 关闭自定义战斗编辑器
    function closeCustomBattleEditor() {
      document.getElementById('customBattleOverlay').classList.remove('visible');
    }

    // 选择自定义战斗模式
    function selectCustomMode(mode) {
      currentBattleMode = mode;
      // 更新面板内按钮状态
      document.querySelectorAll('.custom-mode-btn').forEach((btn, i) => {
        btn.classList.toggle('active', i + 1 === mode);
      });
      // 更新主界面按钮状态
      document.querySelectorAll('.mode-switch-btn').forEach((btn, i) => {
        btn.classList.toggle('active', i + 1 === mode);
      });
      document.getElementById('customBtn').classList.remove('active');
    }

    // 渲染自定义编辑器
    function renderCustomEditor() {
      renderPlayerList();
      renderEnemyList();
      updateAddButtons();
    }

    // 渲染伙伴列表
    function renderPlayerList() {
      const container = document.getElementById('playerList');
      document.getElementById('playerCount').textContent = customPlayerConfig.length + '/5';

      if (customPlayerConfig.length === 0) {
        container.innerHTML = '<div class="custom-battle-empty">暂无伙伴，请添加</div>';
        return;
      }

      container.innerHTML = customPlayerConfig.map((p, index) => {
        const stats = getCreatureStats(p.templateId, p.level);
        return `
        <div class="custom-battle-row">
          <div class="custom-battle-unit element-${p.element}">
            <div>
              <div class="custom-battle-unit-name">Lv.${p.level} ${p.name}</div>
              <div class="custom-battle-unit-stats">${getElementName(p.element)} | HP ${stats.maxHp} | 攻 ${stats.attack} | 防 ${stats.defense} | 速 ${stats.speed}</div>
            </div>
          </div>
          <select class="custom-battle-type-select" onchange="changePlayerTemplate(${index}, this.value)">
            ${CREATURE_TEMPLATES.map(t => `<option value="${t.id}" ${p.templateId === t.id ? 'selected' : ''}>${t.name}</option>`).join('')}
          </select>
          <select class="custom-battle-level-select" onchange="changePlayerLevel(${index}, this.value)">
            ${Array.from({length: MAX_LEVEL}, (_, i) => i + 1).map(l => `<option value="${l}" ${p.level === l ? 'selected' : ''}>Lv.${l}</option>`).join('')}
          </select>
          <button class="custom-battle-remove-btn" onclick="removeCustomPlayer(${index})">&times;</button>
        </div>
      `}).join('');
    }

    // 渲染敌人列表
    function renderEnemyList() {
      const container = document.getElementById('enemyList');
      document.getElementById('enemyCount').textContent = customEnemyConfig.length + '/5';

      if (customEnemyConfig.length === 0) {
        container.innerHTML = '<div class="custom-battle-empty">暂无敌人，请添加</div>';
        return;
      }

      container.innerHTML = customEnemyConfig.map((e, index) => {
        const typeConfig = ENEMY_TYPE_CONFIG[e.enemyType || 'normal'];
        // 计算属性（考虑敌人类型加成）
        const baseStats = getCreatureStats(e.templateId, e.level);
        const typeMult = {
          hp: typeConfig.hpMult,
          attack: typeConfig.atkMult,
          defense: typeConfig.defMult,
          spAttack: typeConfig.spAtkMult,
          spDefense: typeConfig.spDefMult
        };
        const stats = {
          maxHp: Math.floor(baseStats.maxHp * typeMult.hp),
          attack: Math.floor(baseStats.attack * typeMult.attack),
          defense: Math.floor(baseStats.defense * typeMult.defense),
          spAttack: Math.floor(baseStats.spAttack * typeMult.spAttack),
          spDefense: Math.floor(baseStats.spDefense * typeMult.spDefense)
        };
        return `
        <div class="custom-battle-row">
          <div class="custom-battle-unit element-${e.element}">
            <div>
              <div class="custom-battle-unit-name">Lv.${e.level} ${e.name} <span class="custom-battle-type-badge ${typeConfig.cssClass}" style="margin-left:4px">${typeConfig.name}</span></div>
              <div class="custom-battle-unit-stats">${getElementName(e.element)} | HP ${stats.maxHp}(×${typeConfig.hpMult}) | 攻 ${stats.attack}(×${typeConfig.atkMult}) | 防 ${stats.defense}(×${typeConfig.defMult})</div>
            </div>
          </div>
          <select class="custom-battle-type-select" onchange="changeEnemyTemplate(${index}, this.value)">
            ${CREATURE_TEMPLATES.map(t => `<option value="${t.id}" ${e.templateId === t.id ? 'selected' : ''}>${t.name}</option>`).join('')}
          </select>
          <select class="custom-battle-level-select" onchange="changeEnemyLevel(${index}, this.value)">
            ${Array.from({length: MAX_LEVEL}, (_, i) => i + 1).map(l => `<option value="${l}" ${e.level === l ? 'selected' : ''}>Lv.${l}</option>`).join('')}
          </select>
          <select class="custom-battle-type-select" onchange="changeEnemyType(${index}, this.value)">
            <option value="normal" ${e.enemyType === 'normal' ? 'selected' : ''}>普通</option>
            <option value="elite" ${e.enemyType === 'elite' ? 'selected' : ''}>精英</option>
            <option value="boss" ${e.enemyType === 'boss' ? 'selected' : ''}>首领</option>
          </select>
          <button class="custom-battle-remove-btn" onclick="removeCustomEnemy(${index})">&times;</button>
        </div>
      `}).join('');
    }

    // 更新添加按钮状态
    function updateAddButtons() {
      document.getElementById('addPlayerBtn').disabled = customPlayerConfig.length >= 5;
      document.getElementById('addEnemyBtn').disabled = customEnemyConfig.length >= 5;
      document.getElementById('addPlayerBtn').style.display = customPlayerConfig.length >= 5 ? 'none' : 'inline-block';
      document.getElementById('addEnemyBtn').style.display = customEnemyConfig.length >= 5 ? 'none' : 'inline-block';
    }

    // 添加伙伴
    function addCustomPlayer() {
      if (customPlayerConfig.length >= 5) return;
      const availableTemplates = CREATURE_TEMPLATES.filter(t => !customPlayerConfig.some(p => p.templateId === t.id));
      if (availableTemplates.length === 0) return;

      const template = availableTemplates[0];
      customPlayerConfig.push({
        templateId: template.id,
        name: template.name,
        element: template.element,
        level: 60
      });
      renderCustomEditor();
    }

    // 添加敌人
    function addCustomEnemy() {
      if (customEnemyConfig.length >= 5) return;
      const availableTemplates = CREATURE_TEMPLATES.filter(t => !customEnemyConfig.some(e => e.templateId === t.id));
      if (availableTemplates.length === 0) {
        // 如果所有模板都用过了，从全部模板中随机选一个
        const template = CREATURE_TEMPLATES[Math.floor(Math.random() * CREATURE_TEMPLATES.length)];
        customEnemyConfig.push({
          templateId: template.id,
          name: template.name,
          element: template.element,
          level: 60,
          enemyType: 'normal'
        });
      } else {
        const template = availableTemplates[0];
        customEnemyConfig.push({
          templateId: template.id,
          name: template.name,
          element: template.element,
          level: 60,
          enemyType: 'normal'
        });
      }
      renderCustomEditor();
    }

    // 移除伙伴
    function removeCustomPlayer(index) {
      customPlayerConfig.splice(index, 1);
      renderCustomEditor();
    }

    // 移除敌人
    function removeCustomEnemy(index) {
      customEnemyConfig.splice(index, 1);
      renderCustomEditor();
    }

    // 改变伙伴模板
    function changePlayerTemplate(index, templateId) {
      const template = CREATURE_TEMPLATES.find(t => t.id === templateId);
      if (template) {
        customPlayerConfig[index] = {
          ...customPlayerConfig[index],
          templateId: template.id,
          name: template.name,
          element: template.element
        };
        renderCustomEditor();
      }
    }

    // 改变伙伴等级
    function changePlayerLevel(index, level) {
      customPlayerConfig[index] = {
        ...customPlayerConfig[index],
        level: parseInt(level)
      };
      renderCustomEditor();
    }

    // 改变敌人模板
    function changeEnemyTemplate(index, templateId) {
      const template = CREATURE_TEMPLATES.find(t => t.id === templateId);
      if (template) {
        customEnemyConfig[index] = {
          ...customEnemyConfig[index],
          templateId: template.id,
          name: template.name,
          element: template.element
        };
        renderCustomEditor();
      }
    }

    // 改变敌人等级
    function changeEnemyLevel(index, level) {
      customEnemyConfig[index] = {
        ...customEnemyConfig[index],
        level: parseInt(level)
      };
      renderCustomEditor();
    }

    // 改变敌人类型
    function changeEnemyType(index, enemyType) {
      customEnemyConfig[index] = {
        ...customEnemyConfig[index],
        enemyType: enemyType
      };
      renderCustomEditor();
    }

    // 获取属性名称
    function getElementName(element) {
      const names = {
        fire: '火',
        water: '水',
        grass: '草',
        electric: '电',
        ice: '冰',
        rock: '岩',
        psychic: '超能',
        dragon: '龙'
      };
      return names[element] || element;
    }

    // 应用自定义战斗配置
    function applyCustomBattle() {
      if (customPlayerConfig.length === 0) {
        alert('请至少添加一个伙伴');
        return;
      }
      if (customEnemyConfig.length === 0) {
        alert('请至少添加一个敌人');
        return;
      }

      // 关闭编辑界面
      closeCustomBattleEditor();

      // 更新玩家单位
      playerUnits.length = 0;
      customPlayerConfig.forEach((config, index) => {
        const stats = getCreatureStats(config.templateId, config.level);
        const unit = {
          id: config.templateId + '_custom_' + index,
          name: config.name,
          level: config.level,
          side: 'player',  // 阵营标记：伙伴
          maxHp: stats.maxHp,
          currentHp: stats.maxHp,
          attack: stats.attack,
          spAttack: stats.spAttack,
          defense: stats.defense,
          spDefense: stats.spDefense,
          speed: stats.speed,
          element: config.element,
          energy: MAX_ENERGY,
          debuffs: [],
          buffs: []
        };
        playerUnits.push(unit);
      });

      // 更新敌人单位
      enemyUnits.length = 0;
      customEnemyConfig.forEach((config, index) => {
        const typeConfig = ENEMY_TYPE_CONFIG[config.enemyType || 'normal'];
        const baseStats = getCreatureStats(config.templateId, config.level);
        const unit = {
          id: config.templateId + '_enemy_' + index,
          templateId: config.templateId,  // 存储原始模板ID
          name: config.name,
          level: config.level,
          side: 'enemy',  // 阵营标记：敌人
          maxHp: Math.floor(baseStats.maxHp * typeConfig.hpMult),
          currentHp: Math.floor(baseStats.maxHp * typeConfig.hpMult),
          attack: Math.floor(baseStats.attack * typeConfig.atkMult),
          spAttack: Math.floor(baseStats.spAttack * typeConfig.spAtkMult),
          defense: Math.floor(baseStats.defense * typeConfig.defMult),
          spDefense: Math.floor(baseStats.spDefense * typeConfig.spDefMult),
          speed: baseStats.speed,
          element: config.element,
          energy: MAX_ENERGY,
          intent: { type: 'attack', power: 50, targetId: playerUnits[0]?.id },
          debuffs: [],
          buffs: [],
          enemyType: config.enemyType || 'normal'
        };
        enemyUnits.push(unit);
      });

      // 重新分配技能
      initializeCompanionSkills();
      initializeEnemySkills();

      // 保存初始配置
      INITIAL_PLAYER_CONFIG = playerUnits.map(u => JSON.parse(JSON.stringify(u)));
      INITIAL_ENEMY_CONFIG = enemyUnits.map(u => {
        const config = JSON.parse(JSON.stringify(u));
        delete config.skills;
        return config;
      });

      // 重置战斗状态
      restartBattleForModeSwitch();

      addLog('=== 自定义战斗开始 ===');
      renderPlayerUnits();
      renderEnemyUnits();
    }

    // 获取模式名称
    function getModeName(mode) {
      const names = { 1: '经典模式', 2: '宝可梦模式', 3: '以太术士模式' };
      return names[mode] || '未知模式';
    }

    // 重置战斗状态（用于切换模式）
    function restartBattleForModeSwitch() {
      // 重置玩家单位
      playerUnits.forEach((unit, index) => {
        const config = INITIAL_PLAYER_CONFIG[index];
        Object.assign(unit, JSON.parse(JSON.stringify(config)));
      });

      // 重置敌人单位
      enemyUnits.forEach((unit, index) => {
        const config = INITIAL_ENEMY_CONFIG[index];
        Object.assign(unit, JSON.parse(JSON.stringify(config)));
        // 重新初始化敌人技能
        unit.skills = assignSkillsByElement(unit.element, unit.id);
      });

      currentRound = 1;
      battleEnded = false;
      selectedPlayer = null;
      playerCommands = [];
      actionQueue = [];
      currentActionIndex = 0;
      isRoundExecuting = false;
      isBattleStarted = false;
      isPreparing = false;
      isExecuting = false;
      executedPlayerIds.clear();
      playerActionQueue = [];
      enemyActionQueue = [];

      document.getElementById('battleEndOverlay').classList.remove('visible');
      document.getElementById('commandList').style.display = 'block';
      document.getElementById('logContent').innerHTML = '';
      document.getElementById('actionOrderDisplay').classList.remove('visible');
      hideActionOrder();
    }

    // 更新回合显示（支持三种模式）
    function updateTurnDisplay(currentAction = null) {
      document.getElementById('turnNumber').textContent = '第 ' + currentRound + ' 轮';
      const phaseText = document.getElementById('phaseText');

      switch (currentBattleMode) {
        case 1: // 经典模式
          if (isRoundExecuting && currentAction) {
            const isPlayer = currentAction.type === 'player';
            phaseText.textContent = isPlayer ? '己方回合' : '敌人回合';
            phaseText.className = 'phase-text ' + (isPlayer ? 'player-turn' : 'enemy-turn');
          } else if (!isBattleStarted) {
            phaseText.textContent = '等待开始';
            phaseText.className = 'phase-text';
          } else {
            phaseText.textContent = '己方回合';
            phaseText.className = 'phase-text player-turn';
          }
          break;

        case 2: // 宝可梦模式
          if (isRoundExecuting && currentAction) {
            const isPlayer = currentAction.type === 'player';
            phaseText.textContent = isPlayer ? '己方回合 - ' + currentAction.caster.name : '敌人回合';
            phaseText.className = 'phase-text ' + (isPlayer ? 'player-turn' : 'enemy-turn');
          } else if (!isBattleStarted) {
            phaseText.textContent = '等待开始';
            phaseText.className = 'phase-text';
          } else if (isRoundExecuting) {
            phaseText.textContent = '己方回合 - 等待选择';
            phaseText.className = 'phase-text player-turn';
          } else {
            phaseText.textContent = '己方回合';
            phaseText.className = 'phase-text player-turn';
          }
          break;

        case 3: // 以太术士模式
          if (phase === 'enemy_action') {
            phaseText.textContent = '敌人回合';
            phaseText.className = 'phase-text enemy-turn';
          } else if (phase === 'player_action') {
            phaseText.textContent = '己方回合 - ' + (selectedPlayer ? selectedPlayer.name + ' 行动中' : '等待');
            phaseText.className = 'phase-text player-turn';
          } else if (!isBattleStarted) {
            phaseText.textContent = '选择行动的伙伴';
            phaseText.className = 'phase-text';
          } else {
            phaseText.textContent = '选择行动的伙伴';
            phaseText.className = 'phase-text';
          }
          break;
      }
    }

    function showDamageNumber(targetId, amount, type) {
      const el = document.getElementById(targetId);
      if (!el) return;
      const num = document.createElement('div');
      num.className = 'damage-number ' + type;
      num.textContent = (type === 'heal' ? '+' : '-') + amount;
      num.style.left = '50%';
      num.style.top = '20%';
      num.style.transform = 'translateX(-50%)';
      el.appendChild(num);
      setTimeout(() => num.remove(), 800);
    }

    // ==================== 渲染函数 ====================
    function renderPlayerUnits() {
      const container = document.getElementById('playerSide');
      container.innerHTML = '';
      playerUnits.forEach(unit => {
        const div = document.createElement('div');
        div.id = unit.id;
        div.className = 'unit player';
        if (selectedPlayer && selectedPlayer.id === unit.id) div.classList.add('selected');
        // 检查是否有指令
        const hasCommand = playerCommands.find(c => c.casterId === unit.id && c.status === 'pending');
        if (hasCommand) div.classList.add('has-command');

        const isDead = unit.currentHp <= 0;
        const isExecuted = currentBattleMode === 3 && executedPlayerIds.has(unit.id);

        // 状态图标
        let statusIcons = '';
        if (unit.shield && unit.shield > 0) {
          statusIcons += `<div class="status-icon shield-icon" title="护盾: ${unit.shield}">盾</div>`;
        }
        if (unit.damageReduction && unit.damageReduction > 0) {
          statusIcons += `<div class="status-icon reduction-icon" title="减伤: ${Math.round(unit.damageReduction * 100)}%">减${Math.round(unit.damageReduction * 100)}%</div>`;
        }

        // Buff/Debuff状态标签
        let debuffTags = '';
        let buffTags = '';

        // Debuff标签
        if (unit.debuffs) {
          unit.debuffs.forEach(d => {
            if (d.type === 'burn' && d.stacks > 0) {
              debuffTags += `<div class="debuff-tag burn" title="灼烧：每层2%最大HP/回合，层数减半">灼烧${d.stacks}层</div>`;
            } else if (d.type === 'freeze') {
              debuffTags += `<div class="debuff-tag freeze" title="冻结：无法行动">冻结${d.remainingDuration}回合</div>`;
            } else if (d.type === 'paralyze') {
              debuffTags += `<div class="debuff-tag paralyze" title="麻痹：速度-1级">麻痹${d.remainingDuration}回合</div>`;
            } else if (d.type === 'poison' && d.stacks > 0) {
