    function setupIntentTooltip(el, unit) {
      const icon = el.querySelector('.intent-display');
      icon.onmouseenter = (e) => {
        // 1. 显示基本意图信息
        const tooltip = document.createElement('div');
        tooltip.className = 'intent-tooltip';
        // 直接使用 intent.targetId 判断目标
        let targetName = '';
        let targetUnit = null;
        if (unit.intent.targetId === unit.id) {
          // 自身技能：显示施法者自己的名字
          targetName = unit.name;
          targetUnit = unit; // 自身技能的目标是敌人自己
        } else {
          // 攻击类：显示目标敌人名称
          targetUnit = playerUnits.find(p => p.id === unit.intent.targetId && p.currentHp > 0);
          if (!targetUnit) {
            const alivePlayers = playerUnits.filter(p => p.currentHp > 0);
            if (alivePlayers.length > 0) {
              targetUnit = alivePlayers[Math.floor(Math.random() * alivePlayers.length)];
            }
          }
          targetName = targetUnit ? targetUnit.name : '未知目标';
        }
        // 获取技能名称
        let skillName = '';
        let skill = null;
        if (unit.intent.skillId && unit.skills) {
          skill = unit.skills.find(s => s.id === unit.intent.skillId);
          if (skill) {
            skillName = skill.name;
          }
        }
        // 组合意图显示信息
        let intentHtml = `<strong>${getIntentText(unit.intent.type)}</strong>`;
        if (skillName) {
          intentHtml = `<strong>${skillName}</strong>`;
        }
        if (unit.intent.power && unit.intent.type === 'attack') {
          intentHtml += `<br>威力: ${unit.intent.power}`;
        }
        // 直接使用 targetId 判断：自身技能显示施法者，治疗/防御/强化技能显示自身
        if (unit.intent.targetId === unit.id) {
          intentHtml += `<br>目标: ${unit.name}`;
        } else if (targetName) {
          intentHtml += `<br>目标: ${targetName}`;
        }
        tooltip.innerHTML = intentHtml;
        document.body.appendChild(tooltip);
        const rect = icon.getBoundingClientRect();
        tooltip.style.left = (rect.right + 10) + 'px';
        tooltip.style.top = rect.top + 'px';
        icon._tooltip = tooltip;

        // 2. 显示技能详细信息框（引用技能卡悬停的显示逻辑）
        if (skill) {
          showSkillTooltip(e, skill, icon, targetUnit);
        }
      };
      icon.onmouseleave = () => {
        if (icon._tooltip) { icon._tooltip.remove(); delete icon._tooltip; }
        hideSkillTooltip();
      };
    }

    // ==================== 技能卡悬停提示 ====================
    let skillTooltip = null;

    // 获取属性名称
    function getElementName(element) {
      const map = { fire: '火', water: '水', grass: '草', electric: '电', ice: '冰', rock: '岩', psychic: '超能', dragon: '龙' };
      return map[element] || '无';
    }

    // 获取技能类型文本
    function getSkillTypeName(type) {
      const map = { fire: '攻击', heal: '治疗', shield: '护盾', buff: '强化', special: '特殊', debuff: '弱化', energy: '回复' };
      return map[type] || '特殊';
    }

    // 获取技能类型样式
    function getSkillTypeClass(type) {
      const map = { fire: 'fire', heal: 'heal', shield: 'shield', buff: 'buff', special: 'special', debuff: 'debuff', energy: 'heal' };
      return map[type] || 'special';
    }

    // 获取目标类型文本
    function getTargetText(target) {
      const map = { single_enemy: '单体敌人', ally: '单体队友', all_enemy: '全体敌人', all_ally: '全体队友', self: '自身' };
      return map[target] || target;
    }

    // 获取能量消耗文本
    function getEnergyCostText(cost) {
      if (cost === 0) return '免费';
      return `${cost}能量`;
    }

    function showSkillTooltip(e, skill, card, target = null) {
      hideSkillTooltip();
      skillTooltip = document.createElement('div');
      skillTooltip.className = 'skill-tooltip';

      // 基础信息行
      let html = `
        <div class="skill-tooltip-name">${skill.name}</div>
        <div class="skill-tooltip-info">
          <span class="skill-type-badge ${getSkillTypeClass(skill.type)}">${getSkillTypeName(skill.type)}</span>
          ${skill.element ? `<span class="skill-element-badge">${getElementName(skill.element)}属性</span>` : ''}
        </div>
      `;

      // 根据技能类型显示不同信息
      // 攻击技能（包括fire、special、water、electric等有威力的攻击技能）显示威力
      if (skill.type === 'fire' || skill.type === 'special' || skill.type === 'water' ||
          skill.type === 'electric' || skill.type === 'debuff' || skill.type === 'ice') {
        // 雷霆连击：多段攻击显示
        if (skill.effect === 'combo' && skill.comboHits && skill.comboPower) {
          html += `<div class="skill-tooltip-power">威力: ${skill.comboPower}×${skill.comboHits}（共${skill.comboPower * skill.comboHits}）</div>`;
        } else if (skill.power && skill.power > 0) {
          html += `<div class="skill-tooltip-power">威力: ${skill.power}</div>`;
        }
      } else if (skill.type === 'shield') {
        // 护盾技能 - 显示护盾值
        if (skill.power && skill.power > 0) {
          html += `<div class="skill-tooltip-shield">护盾值: ${skill.power}</div>`;
        }
      } else if (skill.type === 'heal') {
        // 治疗技能 - 显示治疗量
        if (skill.power && skill.power > 0) {
          html += `<div class="skill-tooltip-heal">治疗量: ${skill.power}</div>`;
        }
      } else if (skill.type === 'energy') {
        // 能量回复技能 - 显示回复量
        if (skill.effect === 'energy_restore') {
          html += `<div class="skill-tooltip-energy-restore">回复能量: +${skill.power}</div>`;
        }
      } else if (skill.type === 'buff') {
        // 能量回复技能
        if (skill.effect === 'energy_restore') {
          html += `<div class="skill-tooltip-energy-restore">回复能量: +${skill.power}</div>`;
        } else if (skill.power && skill.power > 0) {
          // 强化技能 - 显示效果说明
          html += `<div class="skill-tooltip-power">强化: +${skill.power}</div>`;
        }
      }

      // 目标
      html += `<div class="skill-tooltip-info">目标: ${getTargetText(skill.target)}</div>`;

      // 能量消耗
      html += `<div class="skill-tooltip-energy">消耗: ${getEnergyCostText(skill.energyCost)}</div>`;

      // 特殊效果描述（仅对非burnMark类型显示）
      if (skill.effect && skill.effect !== 'burnMark') {
        let effectText = '';
        if (skill.effect === 'burn') {
          // 灼烧：根据层数显示不同描述
          if (skill.burnStacks) {
            effectText = `目标灼烧（${skill.burnStacks}层），每层2%最大HP/回合，层数减半`;
          } else {
            effectText = '目标灼烧，每层2%最大HP/回合，层数减半';
          }
        } else {
          const effectNames = {
            drain: '每回合吸取目标12%HP',
            poison: '目标中毒，每回合受到8%最大HP伤害',
            freeze: '20%概率冻结目标',
            slow: '目标速度-1级',
            stun: '30%概率使目标昏迷1回合',
            reflect: '反射50%受到的特殊伤害',
            barrier: '免疫下一次攻击',
            paralyze: '目标麻痹',
            combo: '多段攻击',
            priority: '先手+1',
            static_body: '蓄电护体：减伤+蓄电',
            chain_damage: '连锁效果：扩散伤害',
            // 水系效果
            water_soak: '目标获得浸透（特防-1级/层）',
            drowning: '目标溺水（下次能量消耗>3的技能伤害-30%）',
            weakness: '自身虚弱（下一回合无法使用技能）'
          };
          effectText = effectNames[skill.effect] || skill.effect;
        }
        if (effectText) {
          html += `<div class="skill-tooltip-effect">效果: ${effectText}</div>`;
        }

        // 水系效果补充描述
        if (skill.waterSoakEffect) {
          html += `<div class="skill-tooltip-effect">附加「浸透」（特防-1级/层，最多${skill.waterSoakMaxStacks || 6}层，持续${skill.waterSoakDuration || 2}回合）</div>`;
        }
        if (skill.drowningEffect) {
          html += `<div class="skill-tooltip-effect">附加「溺水」（下一次能量消耗>3的技能伤害-30%，持续${skill.drowningDuration || 3}回合）</div>`;
        }
        if (skill.muddyEffect) {
          html += `<div class="skill-tooltip-effect">30%概率使目标获得「浑浊」（命中率-1级/层，最多${skill.muddyMaxStacks || 3}层）</div>`;
        }
        if (skill.steamBurnChance > 0) {
          html += `<div class="skill-tooltip-effect">${Math.round(skill.steamBurnChance * 100)}%概率使目标陷入「蒸汽灼伤」（每回合损失2%最大HP）</div>`;
        }
        if (skill.weaknessEffect) {
          html += `<div class="skill-tooltip-effect">使用后自身获得「虚弱」（下一回合无法使用技能）</div>`;
        }
        if (skill.clearSpringEffect) {
          html += `<div class="skill-tooltip-effect">每回合回复10%HP并清除1个负面状态（持续${skill.clearSpringDuration || 3}回合）</div>`;
        }
        if (skill.flowEffect) {
          html += `<div class="skill-tooltip-effect">附加「流水」（速度+1级，持续2回合）</div>`;
        }
        if (skill.rainyDayEffect) {
          html += `<div class="skill-tooltip-effect">创造雨天环境（持续${skill.rainyDayDuration || 3}回合），水属性技能威力+${Math.round((skill.rainyDayPowerBoost || 0.5) * 100)}%</div>`;
        }
      }

      // 属性克制关系提示（仅攻击技能且有目标时显示）
      if (target && skill.element && (skill.type === 'fire' || skill.type === 'special' || skill.type === 'water' ||
          skill.type === 'electric' || skill.type === 'debuff' || skill.type === 'ice')) {
        const skillElement = skill.element;
        const targetElements = target.elements || [target.element];
        const multiplier = calculateDamageMultiplier(skillElement, targetElements);

        // 根据实际倍率显示提示
        if (multiplier >= 4) {
          html += `<div class="skill-tooltip-matchup super-effective">⚠️ 效果绝佳！造成${multiplier}倍伤害</div>`;
        } else if (multiplier >= 2) {
          html += `<div class="skill-tooltip-matchup super-effective">⚠️ 效果拔群！造成${multiplier}倍伤害</div>`;
        } else if (multiplier <= 0.25) {
          html += `<div class="skill-tooltip-matchup not-effective">效果微乎其微...伤害仅${multiplier}倍</div>`;
        } else if (multiplier < 1) {
          html += `<div class="skill-tooltip-matchup not-effective">效果微弱...伤害仅${multiplier}倍</div>`;
        }
      }

      // 技能描述
      if (skill.description) {
        html += `<div class="skill-tooltip-desc">${skill.description}</div>`;
      }

      skillTooltip.innerHTML = html;
      document.body.appendChild(skillTooltip);

      const rect = card.getBoundingClientRect();
      skillTooltip.style.left = (rect.left + rect.width / 2) + 'px';
      skillTooltip.style.top = (rect.top - 10) + 'px';
      skillTooltip.style.transform = 'translate(-50%, -100%)';
    }

    function hideSkillTooltip() {
      if (skillTooltip) { skillTooltip.remove(); skillTooltip = null; }
    }

    function renderSkillPanel(unit) {
      const panel = document.getElementById('skillPanel');
      const hint = document.getElementById('actionHint');
      if (!unit) {
        panel.classList.remove('visible');
        panel.innerHTML = '<div class="action-hint" id="actionHint">点击左侧伙伴选择技能</div>';
        return;
      }
      
      // 获取当前能量
      const currentEnergy = unit.energy;
      
      panel.innerHTML = unit.skills.map(skill => `
        <div class="skill-card ${skill.energyCost > currentEnergy ? 'no-energy' : ''}" data-skill-id="${skill.id}">
          <div class="skill-icon ${skill.type}">
            <svg viewBox="0 0 24 24"><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"/></svg>
          </div>
          <div class="skill-name">${skill.name}</div>
          <div class="skill-energy">${getEnergyText(skill.energyCost)}</div>
        </div>
      `).join('') + '<div class="action-hint" id="actionHint">拖动技能到目标</div>';
      panel.classList.add('visible');

      let dragPreview = null;

      panel.querySelectorAll('.skill-card').forEach(card => {
        const skillId = card.dataset.skillId;
        const skill = unit.skills.find(s => s.id === skillId);

        // 悬停显示提示
        card.onmouseenter = (e) => { if (skill) showSkillTooltip(e, skill, card); };
        card.onmouseleave = hideSkillTooltip;

        // 拖拽开始
        card.onmousedown = (e) => {
          if (!skill || skill.energyCost > currentEnergy) return;
          e.preventDefault();
          isDragging = true;

          draggedSkill = skillId;
          updateTargetIndicators(skill);

          // 创建拖拽预览
          dragPreview = document.createElement('div');
          dragPreview.className = 'drag-preview';
          dragPreview.innerHTML = card.innerHTML;
          document.body.appendChild(dragPreview);

          const moveHandler = (e) => {
            if (dragPreview) {
              dragPreview.style.left = e.clientX - 30 + 'px';
              dragPreview.style.top = e.clientY - 38 + 'px';
            }
          };

          const upHandler = async (e) => {
            document.removeEventListener('mousemove', moveHandler);
            document.removeEventListener('mouseup', upHandler);
            isDragging = false;
            if (dragPreview) { dragPreview.remove(); dragPreview = null; }

            // 查找鼠标位置下的单位元素
            const elementAtPoint = document.elementFromPoint(e.clientX, e.clientY);
            const findUnitElement = (selector) => {
              // 先检查元素本身
              if (elementAtPoint && elementAtPoint.matches && elementAtPoint.matches(selector)) {
                return elementAtPoint;
              }
              // 再检查祖先元素
              return elementAtPoint?.closest(selector);
            };

            // 检查是否在有效目标上释放
            let targetUnit = null;
            let cmdSuccess = false;

            if (skill.target === 'self') {
              // 自身目标技能：必须在自身身上释放
              targetUnit = findUnitElement('.unit.player');
              if (targetUnit && targetUnit.id === unit.id) {
                cmdSuccess = await addCommand(unit, skill, unit.id);
              }
            } else if (skill.target === 'all_enemy') {
              // 全体敌人技能：必须在敌人身上释放
              targetUnit = findUnitElement('.unit.enemy');
              if (targetUnit) {
                cmdSuccess = await addCommand(unit, skill, targetUnit.id);
              }
            } else if (skill.target === 'all_ally') {
              // 全体队友技能：必须在队友身上释放
              targetUnit = findUnitElement('.unit.player');
              if (targetUnit) {
                cmdSuccess = await addCommand(unit, skill, targetUnit.id);
              }
            } else {
              // 单体技能：必须在有效目标上释放
              targetUnit = findUnitElement('.unit.enemy.targetable') || findUnitElement('.unit.player.targetable');
              if (targetUnit) {
                cmdSuccess = await addCommand(unit, skill, targetUnit.id);
              }
            }

            draggedSkill = null;
            // 取消抓取时清除克制关系提示
            clearDragIndicators();

            // 只有成功下达指令才完全取消选择，否则保留技能面板
            if (!cmdSuccess) {
              // 技能未成功使用，标记为拖拽释放，跳过 click 事件处理
              wasDragReleased = true;
            } else {
              deselectPlayer();
            }
          };

          document.addEventListener('mousemove', moveHandler);
          document.addEventListener('mouseup', upHandler);
        };

        // 点击选择技能
        card.onclick = (e) => {
          if (skill) updateTargetIndicators(skill);
        };
      });
    }

    function updateTargetIndicators(skill) {
      // 移除所有高亮和克制关系样式
      document.querySelectorAll('.unit').forEach(el => {
        el.classList.remove('targetable', 'matchup-super', 'matchup-weak');
      });
      // 移除所有克制关系提示
      document.querySelectorAll('.matchup-hint').forEach(el => el.remove());

      if (skill.target === 'single_enemy' || skill.target === 'all_enemy') {
        // 对敌人技能：根据克制关系高亮
        enemyUnits.filter(e => e.currentHp > 0).forEach(e => {
          const el = document.getElementById(e.id);
          if (el) {
            el.classList.add('targetable');
            // 计算克制关系
            if (skill.element) {
              const multiplier = calculateDamageMultiplier(skill.element, e.elements || [e.element]);
              if (multiplier >= 2) {
                el.classList.add('matchup-super');
              } else if (multiplier < 1) {
                el.classList.add('matchup-weak');
              }
              // 在敌人信息框右侧显示克制关系
              const hint = document.createElement('div');
              hint.className = 'matchup-hint';
              if (multiplier >= 4) {
                hint.classList.add('super');
                hint.textContent = `效果绝佳 ×${multiplier}`;
              } else if (multiplier >= 2) {
                hint.classList.add('super');
                hint.textContent = `效果拔群 ×${multiplier}`;
              } else if (multiplier < 1) {
                hint.classList.add('weak');
                hint.textContent = `逆属性 ×${multiplier}`;
              } else {
                hint.classList.add('normal');
                hint.textContent = `普通 ×${multiplier}`;
              }
              el.appendChild(hint);
            }
          }
        });
      } else if (skill.target === 'ally') {
        playerUnits.filter(p => p.currentHp > 0).forEach(p => {
          document.getElementById(p.id)?.classList.add('targetable');
        });
      } else if (skill.target === 'all_ally') {
        // 全体队友技能：所有存活的队友都可作为释放目标
        playerUnits.filter(p => p.currentHp > 0).forEach(p => {
          document.getElementById(p.id)?.classList.add('targetable');
        });
      }
    }

    // ==================== 事件处理 ====================
    function onPlayerClick(unit) {
      // 模式2（宝可梦模式）有单独的点击逻辑
      if (currentBattleMode === 2) {
        if (battleEnded || isExecuting) return;
        // 如果该伙伴已有指令，允许查看技能状态
        if (playerCommands.find(c => c.casterId === unit.id && c.status === 'pending')) {
          selectedPlayer = unit;
          document.querySelectorAll('.unit').forEach(el => el.classList.remove('selected'));
          document.getElementById(unit.id)?.classList.add('selected');
          return;
        }
        if (selectedPlayer && selectedPlayer.id === unit.id) {
          selectedPlayer = null;
          renderSkillPanel(null);
        } else {
          selectedPlayer = unit;
          renderSkillPanel(unit);
        }
        renderPlayerUnits();
        return;
      }

      // 模式3（以太术士模式）
      if (currentBattleMode === 3) {
        onPlayerClickMode3(unit);
        return;
      }

      // 模式1（经典模式）
      onPlayerClickClassic(unit);
    }

    // 模式3：以太术士模式 - 玩家逐个选择伙伴行动
    function onPlayerClickMode3(unit) {
      if (battleEnded) return;

      // 检查伙伴是否存活
      if (unit.currentHp <= 0) return;

      // 检查伙伴是否已经行动过
      if (executedPlayerIds.has(unit.id)) {
        addLog(`${unit.name} 已经行动过了`);
        return;
      }

      // 如果战斗还没开始或处于idle阶段，点击伙伴时开始战斗并初始化轮次
      if (phase === 'idle' || !isBattleStarted) {
        startRoundMode3();
        // 立即显示行动顺序面板
        document.getElementById('actionOrderDisplay').classList.add('visible');
        // 初始化完成后选中该伙伴
        selectedPlayer = unit;
        renderSkillPanel(unit);
        renderPlayerUnits();
        return;
      }

      // 检查是否正在执行行动中（玩家行动阶段不允许选择其他伙伴）
      if (phase === 'player_action') {
        // 如果是当前正在等待的伙伴，可以选择
        if (selectedPlayer && selectedPlayer.id === unit.id) {
          selectedPlayer = unit;
          renderSkillPanel(unit);
          renderPlayerUnits();
        } else {
          addLog(`请等待当前伙伴完成行动`);
        }
        return;
      }

      // 玩家选择阶段：选择伙伴
      if (phase === 'player_select') {
        selectedPlayer = unit;
        renderSkillPanel(unit);
        renderPlayerUnits();
        return;
      }

      // 其他阶段不响应
    }

    // 模式1（经典模式）
    function onPlayerClickClassic(unit) {
      if (battleEnded) return;

      // 如果战斗还没开始，点击玩家时开始战斗并选中该玩家
      if (!isBattleStarted) {
        isBattleStarted = true;
        isRoundExecuting = true;
        document.getElementById('actionOrderDisplay').classList.add('visible');
        addLog('===== 战斗开始 =====');
        addLog('选择技能开始行动！');

        // 选中点击的伙伴并显示技能面板
        selectedPlayer = unit;
        renderSkillPanel(unit);
        renderPlayerUnits();
        updateTurnDisplay();
        return;
      }

      // 检查是否是当前应该行动的伙伴
      const action = getCurrentAction();
      if (action && action.type === 'player' && action.caster.id === unit.id) {
        // 该伙伴是当前应该行动的单位，选中它显示技能
        selectedPlayer = unit;
        renderSkillPanel(unit);
        renderPlayerUnits();
        return;
      }

      // 如果该伙伴已有指令，允许查看
      if (playerCommands.find(c => c.casterId === unit.id && c.status === 'pending')) {
        selectedPlayer = unit;
        document.querySelectorAll('.unit').forEach(el => el.classList.remove('selected'));
        document.getElementById(unit.id)?.classList.add('selected');
        return;
      }

      // 其他情况：选中显示技能面板
      if (selectedPlayer && selectedPlayer.id === unit.id) {
        selectedPlayer = null;
        renderSkillPanel(null);
      } else {
        selectedPlayer = unit;
        renderSkillPanel(unit);
      }
      renderPlayerUnits();
    }

    function onEnemyClick(unit) {
      // 点击敌人不执行任何操作，拖拽时在dragPreview的mouseup中处理
    }

    function deselectPlayer() {
      selectedPlayer = null;
      draggedSkill = null;
      document.querySelectorAll('.unit').forEach(el => el.classList.remove('targetable', 'selected', 'matchup-super', 'matchup-weak'));
      // 移除所有克制关系提示
      document.querySelectorAll('.matchup-hint').forEach(el => el.remove());
      renderPlayerUnits();
      renderSkillPanel(null);
    }

    // 清除拖拽相关的指示器（克制关系边框和提示），保留伙伴选择状态
    function clearDragIndicators() {
      document.querySelectorAll('.unit').forEach(el => el.classList.remove('targetable', 'matchup-super', 'matchup-weak'));
      document.querySelectorAll('.matchup-hint').forEach(el => el.remove());
    }

    // ==================== 指令系统 ====================
    async function addCommand(caster, skill, targetId) {
      // 检查能量是否足够
      if (caster.energy < skill.energyCost) {
        addLog(`${caster.name} 能量不足，无法使用 ${skill.name}`);
        return false;
      }

      const energyBefore = caster.energy;

      // 消耗能量
      caster.energy -= skill.energyCost;

      // 添加指令
      const cmd = {
        casterId: caster.id,
        skillId: skill.id,
        targetId: targetId,
        status: 'pending',
        energySpent: skill.energyCost,
        energyBefore: energyBefore,
        energyAfter: caster.energy
      };
      playerCommands.push(cmd);

      addLog(`${caster.name} 下达指令：${skill.name}（消耗${skill.energyCost}能量 ${energyBefore}→${caster.energy}）`);
      renderCommandList();
      renderSkillPanel(caster);
      renderPlayerUnits();
      updateTurnDisplay();

      // 模式2（宝可梦模式）：检查是否所有存活伙伴都已下达指令
      if (currentBattleMode === 2) {
        checkAllReady();
        deselectPlayer();
        return true;
      }

      // 模式3（以太术士模式）：如果选择了该伙伴，立即执行
      if (currentBattleMode === 3) {
        if (phase === 'player_action' && selectedPlayer && selectedPlayer.id === caster.id) {
          await executePlayerActionAndContinueMode3(caster, skill, targetId);
        } else if (phase === 'player_select' && selectedPlayer && selectedPlayer.id === caster.id) {
          await executePlayerActionAndContinueMode3(caster, skill, targetId);
        } else {
          deselectPlayer();
        }
        return true;
      }

      return true;
    }

    // 检查是否所有存活伙伴都已下达指令（模式2）
    function checkAllReady() {
      const alivePlayers = playerUnits.filter(u => u.currentHp > 0);
      const readyCount = playerCommands.filter(c => {
        const unit = playerUnits.find(p => p.id === c.casterId);
        return unit && unit.currentHp > 0;
      }).length;

      if (alivePlayers.length > 0 && readyCount === alivePlayers.length) {
        // 所有存活伙伴都已下达指令，自动开始战斗结算
        setTimeout(() => startCombatPhase(), 500);
      }
    }

    // ==================== 模式3（以太术士模式）系统 ====================

    // 模式3：初始化轮次
    function startRoundMode3() {
      if (battleEnded) return;

      isBattleStarted = true;
      isRoundExecuting = true;
      isExecuting = true;

      document.getElementById('skillPanel').classList.remove('visible');
      document.getElementById('commandList').style.display = 'none';

      addLog(`===== 第 ${currentRound} 轮开始 =====`);

      // 初始化敌人意图
      for (const enemy of enemyUnits) {
        if (enemy.currentHp > 0) {
          updateEnemyIntent(enemy);
        }
      }
      renderEnemyUnits();

      // 重置玩家行动状态
      executedPlayerIds.clear();
      selectedPlayer = null;

      // 构建行动队列
      playerActionQueue = buildPlayerActionQueueMode3();
      enemyActionQueue = buildEnemyActionQueue();

      // 显示行动顺序
      const allActions = [...playerActionQueue.map(a => ({...a, queueType: 'player'})), ...enemyActionQueue.map(a => ({...a, queueType: 'enemy'}))];
      showActionOrder(allActions);

      // 进入玩家选择阶段
      phase = 'player_select';
      updateTurnDisplay();
      renderPlayerUnits();
      addLog('选择行动的伙伴');
    }

    // 模式3：构建玩家行动队列
    function buildPlayerActionQueueMode3() {
      const actions = [];
      const alivePlayers = playerUnits.filter(p => p.currentHp > 0);

      for (const player of alivePlayers) {
        // 跳过已执行过的玩家
        if (executedPlayerIds.has(player.id)) continue;

        // 找到该玩家的指令
        const cmd = playerCommands.find(c => c.casterId === player.id && c.status === 'pending');
        let skill = null;
        if (cmd) {
          skill = player.skills.find(s => s.id === cmd.skillId);
        }

        actions.push({
          id: player.id,
          type: 'player',
          caster: player,
          skill: skill,
          targetId: cmd ? cmd.targetId : null,
          speed: player.speed,
          hasCommand: !!cmd,
          command: cmd
        });
      }

      return actions;
    }

    // 模式3：执行选中的玩家行动
    async function executeSelectedPlayerActionMode3() {
      if (!selectedPlayer || battleEnded) return;

      const caster = selectedPlayer;

      // 检查是否有预设指令
      const cmd = playerCommands.find(c => c.casterId === caster.id && c.status === 'pending');

      if (cmd) {
        // 有预设指令，直接执行
        const skill = caster.skills.find(s => s.id === cmd.skillId);
        if (skill) {
          await executePlayerActionAndContinueMode3(caster, skill, cmd.targetId, cmd);
        }
      } else {
        // 没有预设指令，等待选择技能
        renderSkillPanel(caster);
      }
    }

    // 模式3：执行玩家行动并继续
    async function executePlayerActionAndContinueMode3(caster, skill, targetId, cmd) {
      if (battleEnded) return;

      // 标记进入玩家行动阶段
      phase = 'player_action';

      // 查找或创建指令
      let playerCmd = cmd || playerCommands.find(c => c.casterId === caster.id && c.status === 'pending');
      if (!playerCmd) {
        playerCmd = {
          casterId: caster.id,
          skillId: skill.id,
          targetId: targetId,
          status: 'pending'
        };
        playerCommands.push(playerCmd);
      }

      // 更新行动顺序显示
      updateActionOrderDisplay();
      const el = document.getElementById(caster.id);
      if (el) el.classList.add('selected');

      // 执行行动
      await delay(200);
      await executePlayerCommand(caster, skill, targetId);

      // 标记指令为已执行
      playerCmd.status = 'executed';

      // 标记该玩家已执行
      executedPlayerIds.add(caster.id);

      // 清除高亮
      if (el) el.classList.remove('selected');

      await delay(200);

      // 检查战斗结束
      if (checkBattleEnd()) {
        phase = 'idle';
        isRoundExecuting = false;
        return;
      }

      // 从玩家行动队列中移除已执行的玩家
      playerActionQueue = playerActionQueue.filter(a => a.caster.id !== caster.id);

      // 重新构建行动队列并更新显示（模式3需要实时更新已执行状态）
      playerActionQueue = buildPlayerActionQueueMode3();
      enemyActionQueue = buildEnemyActionQueue();
      const allActions = [...playerActionQueue.map(a => ({...a, queueType: 'player', type: 'player'})), ...enemyActionQueue.map(a => ({...a, queueType: 'enemy', type: 'enemy'}))];
      showActionOrder(allActions);

      // 检查是否所有玩家都已行动
      const remainingPlayers = playerUnits.filter(p => p.currentHp > 0 && !executedPlayerIds.has(p.id));
      if (remainingPlayers.length === 0) {
        // 所有玩家行动完毕，进入敌人行动阶段
        await startEnemyPhaseMode3();
      } else {
        // 还有玩家未行动，返回玩家选择阶段
        phase = 'player_select';
        selectedPlayer = null;
        updateTurnDisplay();
        updateActionOrderDisplay();
        renderPlayerUnits();
        addLog('选择下一个行动的伙伴');
      }

      // 解决等待中的 Promise（如果有）
      if (actionResolve) {
        actionResolve();
        actionResolve = null;
      }
    }

    // 模式3：更新行动顺序显示（玩家行动后）
    function updateActionOrderAfterPlayerAction() {
      const items = document.querySelectorAll('.action-order-item');
      items.forEach(item => {
        const icon = item.querySelector('.action-order-icon');
        if (icon && icon.classList.contains('player')) {
          const playerIndex = Array.from(items).indexOf(item);
          const playerId = playerActionQueue[playerIndex]?.caster?.id;
          if (playerId && executedPlayerIds.has(playerId)) {
            item.classList.add('executed');
          }
        }
      });
    }

    // 模式3：检查是否所有玩家都已行动
    function checkAllPlayersExecutedMode3() {
      const alivePlayers = playerUnits.filter(p => p.currentHp > 0);
      return alivePlayers.every(p => executedPlayerIds.has(p.id));
    }

    // 模式3：开始敌人回合
    async function startEnemyPhaseMode3() {
      isExecuting = true;
      updateTurnDisplay();

      addLog('===== 敌人回合开始 =====');
      await delay(300);

      // 执行所有敌人行动
      await executeEnemyTurnMode3();
    }

    // 模式3：执行敌人回合
    async function executeEnemyTurnMode3() {
      for (const action of enemyActionQueue) {
        if (battleEnded) break;
        if (action.caster.currentHp <= 0) continue;

        updateTurnDisplay(action);
        await delay(400);
        await executeEnemyAction(action.caster);
        await delay(200);

        if (checkBattleEnd()) break;
      }

      // 敌人回合结束，进入下一轮
      await finishRoundMode3();
    }

    // 模式3：轮次结束处理
    async function finishRoundMode3() {
      // 标记所有指令为已执行
      playerCommands.forEach(cmd => {
        if (cmd.status === 'pending') cmd.status = 'executed';
      });

      hideActionOrder();
      currentActionIndex = 0;

      // 回合结束 - 处理状态效果
      await delay(300);

      // 处理灼烧效果
      for (const unit of [...playerUnits, ...enemyUnits]) {
        if (unit.currentHp <= 0) continue;

        const burnDebuff = unit.debuffs.find(d => d.type === 'burn');
        if (burnDebuff && burnDebuff.stacks > 0) {
          const burnDamage = Math.floor(unit.maxHp * burnDebuff.damagePercentPerStack * burnDebuff.stacks);
          unit.currentHp = Math.max(0, unit.currentHp - burnDamage);
          showDamageNumber(unit.id, burnDamage, 'damage');
          updateHpBar(unit);
          addLog(`${unit.name} 受到灼烧伤害 ${burnDamage} HP（${burnDebuff.stacks}层）`, 'damage');

          burnDebuff.stacks = Math.max(1, Math.floor(burnDebuff.stacks / 2));
          burnDebuff.remainingDuration--;

          if (burnDebuff.remainingDuration <= 0) {
            unit.debuffs = unit.debuffs.filter(d => d.type !== 'burn');
            addLog(`${unit.name} 的灼烧状态消失了`);
          }
        }

        // 处理燃尽印记
        if (unit.combustionStacks > 0 && unit.currentHp > 0) {
          unit.combustionTurnsLeft--;
          if (unit.combustionTurnsLeft <= 0) {
            const combustionDamage = Math.floor(unit.currentHp * 0.3);
            unit.currentHp = Math.max(0, unit.currentHp - combustionDamage);
            showDamageNumber(unit.id, combustionDamage, 'damage');
            updateHpBar(unit);
            addLog(`${unit.name} 的「燃尽印记」触发，受到 ${combustionDamage} 真实伤害！`, 'damage');
            unit.combustionStacks = 0;
          } else {
            addLog(`${unit.name} 的「燃尽印记」剩余 ${unit.combustionTurnsLeft} 回合`);
          }
        }

        // 处理减速状态
        if (unit.slowed && unit.currentHp > 0) {
          unit.slowTurns--;
          if (unit.slowTurns <= 0) {
            unit.slowed = false;
            addLog(`${unit.name} 的减速状态消失了`);
          }
        }

        // 处理属性抗性倒计时
        if (unit.resistanceTurns && unit.currentHp > 0) {
          for (const el in unit.resistanceTurns) {
            unit.resistanceTurns[el]--;
            if (unit.resistanceTurns[el] <= 0) {
              unit.resistances[el] = 0;
              delete unit.resistanceTurns[el];
              addLog(`${unit.name} 的 ${el} 属性抗性消失了`);
            }
          }
        }

        // ==================== 水系状态效果回合处理（模式1）====================
        // 处理浸透状态（特防-1级/层）
        const waterSoakDebuff1 = unit.debuffs.find(d => d.type === 'water_soak');
        if (waterSoakDebuff1 && waterSoakDebuff1.remainingDuration > 0) {
          waterSoakDebuff1.remainingDuration--;
          if (waterSoakDebuff1.remainingDuration <= 0) {
            unit.debuffs = unit.debuffs.filter(d => d.type !== 'water_soak');
            addLog(`${unit.name} 的「浸透」状态消失了`);
          }
        }

        // 处理溺水状态
        const drowningDebuff1 = unit.debuffs.find(d => d.type === 'drowning');
        if (drowningDebuff1 && drowningDebuff1.remainingDuration > 0) {
          drowningDebuff1.remainingDuration--;
          if (drowningDebuff1.remainingDuration <= 0) {
            unit.debuffs = unit.debuffs.filter(d => d.type !== 'drowning');
            addLog(`${unit.name} 的「溺水」状态消失了`);
          }
        }

        // 处理浑浊状态（命中率-1级/层）
        const muddyDebuff1 = unit.debuffs.find(d => d.type === 'muddy');
        if (muddyDebuff1 && muddyDebuff1.remainingDuration > 0) {
          muddyDebuff1.remainingDuration--;
          if (muddyDebuff1.remainingDuration <= 0) {
            unit.debuffs = unit.debuffs.filter(d => d.type !== 'muddy');
            addLog(`${unit.name} 的「浑浊」状态消失了`);
          }
        }

        // 处理蒸汽灼伤状态
        const steamBurnDebuff1 = unit.debuffs.find(d => d.type === 'steam_burn');
        if (steamBurnDebuff1 && steamBurnDebuff1.remainingDuration > 0) {
          const steamBurnDamage1 = Math.floor(unit.maxHp * steamBurnDebuff1.damagePercentPerStack * steamBurnDebuff1.stacks);
          unit.currentHp = Math.max(0, unit.currentHp - steamBurnDamage1);
          showDamageNumber(unit.id, steamBurnDamage1, 'damage');
          updateHpBar(unit);
          addLog(`${unit.name} 受到蒸汽灼伤 ${steamBurnDamage1} HP`, 'damage');

          steamBurnDebuff1.remainingDuration--;
          if (steamBurnDebuff1.remainingDuration <= 0) {
            unit.debuffs = unit.debuffs.filter(d => d.type !== 'steam_burn');
            addLog(`${unit.name} 的「蒸汽灼伤」状态消失了`);
          }
        }

        // 处理虚弱状态
        const weaknessDebuff1 = unit.debuffs.find(d => d.type === 'weakness');
        if (weaknessDebuff1 && weaknessDebuff1.remainingDuration > 0) {
          weaknessDebuff1.remainingDuration--;
          if (weaknessDebuff1.remainingDuration <= 0) {
            unit.debuffs = unit.debuffs.filter(d => d.type !== 'weakness');
            addLog(`${unit.name} 的「虚弱」状态消失了`);
          }
        }

        // 处理清泉护盾状态（每回合回复10%HP并清除1个debuff）
        const clearSpringBuff1 = unit.buffs?.find(b => b.type === 'clear_spring');
        if (clearSpringBuff1 && clearSpringBuff1.remainingDuration > 0) {
          const clearSpringHeal1 = Math.floor(unit.maxHp * clearSpringBuff1.healPercent);
          unit.currentHp = Math.min(unit.maxHp, unit.currentHp + clearSpringHeal1);
          showDamageNumber(unit.id, clearSpringHeal1, 'heal');
          updateHpBar(unit);
          addLog(`${unit.name} 的「清泉护盾」回复 ${clearSpringHeal1} HP`, 'heal');

          if (unit.debuffs && unit.debuffs.length > 0) {
            const removedDebuff1 = unit.debuffs.shift();
            addLog(`${unit.name} 的「${removedDebuff1.type}」状态被清泉护盾清除`);
          }

          clearSpringBuff1.remainingDuration--;
          if (clearSpringBuff1.remainingDuration <= 0) {
            unit.buffs = unit.buffs.filter(b => b.type !== 'clear_spring');
            addLog(`${unit.name} 的「清泉护盾」状态消失了`);
          }
        }

        // 处理流水状态（速度+1级）
        const flowBuff1 = unit.buffs?.find(b => b.type === 'flow');
        if (flowBuff1 && flowBuff1.remainingDuration > 0) {
          flowBuff1.remainingDuration--;
          if (flowBuff1.remainingDuration <= 0) {
            unit.buffs = unit.buffs.filter(b => b.type !== 'flow');
            addLog(`${unit.name} 的「流水」状态消失了`);
          }
        }

        // 处理雨天天气
        if (globalWeather && globalWeather.type === 'rainy' && globalWeather.duration > 0) {
          globalWeather.duration--;
          if (globalWeather.duration <= 0) {
            globalWeather = null;
            addLog(`雨天天气结束了`);
          }
        }
      }

      await delay(500);

      // 检查战斗是否结束
      if (checkBattleEnd()) {
        isExecuting = false;
        return;
      }

      // 更新敌人意图
      for (const enemy of enemyUnits) {
        if (enemy.currentHp > 0) {
          updateEnemyIntent(enemy);
        }
      }

      // 清空指令和行动状态
      playerCommands = [];
      executedPlayerIds.clear();
      playerActionQueue = [];
      enemyActionQueue = [];

      // 更新所有单位的buff/debuff回合数
      updateBuffTurns();

      // 重置能量（每轮回复能量）
      playerUnits.forEach(u => {
        if (u.currentHp > 0) {
          u.energy = MAX_ENERGY;
        }
      });
      enemyUnits.forEach(u => {
        if (u.currentHp > 0) {
          u.energy = Math.min(u.energy + 3, u.maxEnergy);
        }
      });

      // 进入下一轮
      currentRound++;
      phase = 'idle';
      isExecuting = false;
      isRoundExecuting = false;

      renderEnemyUnits();
      renderPlayerUnits();
      updateTurnDisplay();

      addLog(`===== 第 ${currentRound} 轮等待开始 =====`);
      addLog('点击伙伴开始行动');
    }

      if (battleEnded) return;

      if (currentBattleMode === 2) {
        await executePlayerActionMode2(caster, skill, targetId);

      // 模式1和模式3的逻辑
      // 查找或创建指令
      let cmd = playerCommands.find(c => c.casterId === caster.id && c.status === 'pending');
      if (!cmd) {

          skillId: skill.id,
          targetId: targetId,
          status: 'pending'
        };
        playerCommands.push(cmd);

      // 更新行动顺序显示
      updateActionOrderDisplay(currentActionIndex, 'current');

      await delay(200);
      await executePlayerCommand(caster, skill, targetId);

      // 标记指令为已执行
      cmd.status = 'executed';

      // 清除高亮
      if (el) el.classList.remove('selected');

      await delay(200);

      // 移动到下一个行动
      currentActionIndex++;

      // 继续执行下一个行动
      await executeNextAction();

    // 模式2：执行敌人回合
    async function executeEnemyTurnMode2() {
      while (enemyActionQueue.length > 0) {
        if (battleEnded) break;

        const action = enemyActionQueue[0];

        // 检查敌人是否仍然存活
        if (action.caster.currentHp <= 0) {
          enemyActionQueue.shift();
          continue;
        }

        // 更新UI
        updateTurnDisplay(action);
        updateActionOrderDisplay();

        // 执行行动
        await executeAction(action);
        enemyActionQueue.shift();
        updateEnemyIntent(action.caster);
        renderEnemyUnits();

        await delay(200);

        if (checkBattleEnd()) {
          return;
        }
      }

      // 敌人回合结束，进入下一轮
      await finishRound();
    }

          if (muddyDebuff.remainingDuration <= 0) {
            unit.debuffs = unit.debuffs.filter(d => d.type !== 'muddy');
            addLog(`${unit.name} 的「浑浊」状态消失了`);
          }
        }

        // 处理蒸汽灼伤状态
        const steamBurnDebuff = unit.debuffs.find(d => d.type === 'steam_burn');
        if (steamBurnDebuff && steamBurnDebuff.remainingDuration > 0) {
          const steamBurnDamage = Math.floor(unit.maxHp * steamBurnDebuff.damagePercentPerStack * steamBurnDebuff.stacks);
          unit.currentHp = Math.max(0, unit.currentHp - steamBurnDamage);
          showDamageNumber(unit.id, steamBurnDamage, 'damage');
          updateHpBar(unit);
          addLog(`${unit.name} 受到蒸汽灼伤 ${steamBurnDamage} HP（每回合损失2%最大HP）`, 'damage');

          steamBurnDebuff.remainingDuration--;
          if (steamBurnDebuff.remainingDuration <= 0) {
            unit.debuffs = unit.debuffs.filter(d => d.type !== 'steam_burn');
            addLog(`${unit.name} 的「蒸汽灼伤」状态消失了`);
          }
        }

        // 处理虚弱状态（下一回合无法使用技能）
        const weaknessDebuff = unit.debuffs.find(d => d.type === 'weakness');
        if (weaknessDebuff && weaknessDebuff.remainingDuration > 0) {
          weaknessDebuff.remainingDuration--;
          if (weaknessDebuff.remainingDuration <= 0) {
            unit.debuffs = unit.debuffs.filter(d => d.type !== 'weakness');
            addLog(`${unit.name} 的「虚弱」状态消失了`);
          }
        }

        // 处理清泉护盾状态（每回合回复10%HP并清除1个debuff）
        const clearSpringBuff = unit.buffs?.find(b => b.type === 'clear_spring');
        if (clearSpringBuff && clearSpringBuff.remainingDuration > 0) {
          const clearSpringHeal = Math.floor(unit.maxHp * clearSpringBuff.healPercent);
          unit.currentHp = Math.min(unit.maxHp, unit.currentHp + clearSpringHeal);
          showDamageNumber(unit.id, clearSpringHeal, 'heal');
          updateHpBar(unit);
          addLog(`${unit.name} 的「清泉护盾」回复 ${clearSpringHeal} HP（每回合回复10%HP）`, 'heal');

          if (unit.debuffs && unit.debuffs.length > 0) {
            const removedDebuff = unit.debuffs.shift();
            addLog(`${unit.name} 的「${removedDebuff.type}」状态被清泉护盾清除`);
          }

          clearSpringBuff.remainingDuration--;
          if (clearSpringBuff.remainingDuration <= 0) {
            unit.buffs = unit.buffs.filter(b => b.type !== 'clear_spring');
            addLog(`${unit.name} 的「清泉护盾」状态消失了`);
          }
        }

        // 处理流水状态（速度+1级）
        const flowBuff = unit.buffs?.find(b => b.type === 'flow');
        if (flowBuff && flowBuff.remainingDuration > 0) {
          flowBuff.remainingDuration--;
          if (flowBuff.remainingDuration <= 0) {
            unit.buffs = unit.buffs.filter(b => b.type !== 'flow');
            addLog(`${unit.name} 的「流水」状态消失了`);
          }
        }

        // 处理雨天天气
        if (globalWeather && globalWeather.type === 'rainy' && globalWeather.duration > 0) {
          globalWeather.duration--;
          if (globalWeather.duration <= 0) {
            globalWeather = null;
            addLog(`雨天天气结束了`);
          }
        }
      }

      await delay(500);

      if (!checkBattleEnd()) {
        // 更新敌人意图
        for (const enemy of enemyUnits) {
          if (enemy.currentHp > 0) {
            updateEnemyIntent(enemy);
          }
        }

        // 进入下一回合
        currentRound++;

        // 更新所有单位的buff/debuff回合数
        updateBuffTurns();

        playerCommands = []; // 清空指令
        isPreparing = true;
        isExecuting = false;

        renderEnemyUnits();
        renderPlayerUnits();
        document.getElementById('commandList').style.display = 'block';
        renderCommandList();
        updateTurnDisplay();
        addLog(`===== 第 ${currentRound} 轮开始 =====`);
      }
    }

    // 模式3：构建行动队列
    function buildActionQueueMode3() {
      const actions = [];

      // 添加玩家指令
      for (const cmd of playerCommands) {
        if (cmd.status !== 'pending') continue;
        const caster = playerUnits.find(p => p.id === cmd.casterId);
        if (!caster || caster.currentHp <= 0) continue;

        const skill = caster.skills.find(s => s.id === cmd.skillId);
        if (!skill) continue;

        actions.push({
          id: cmd.casterId,
          type: 'player',
          caster: caster,
          skill: skill,
          targetId: cmd.targetId,
          speed: caster.speed,
          command: cmd
        });
      }

      // 添加敌人行动
      for (const enemy of enemyUnits) {
        if (enemy.currentHp <= 0) continue;
        actions.push({
          id: enemy.id,
          type: 'enemy',
          caster: enemy,
          speed: enemy.speed,
          intent: enemy.intent
        });
      }

      // 按速度排序，同速随机
      actions.sort((a, b) => {
        if (a.speed !== b.speed) return b.speed - a.speed;
        return Math.random() - 0.5;
      });

      return actions;
    }

    // 模式3：执行单个行动
    async function executeActionMode3(action, actionIndex, totalActions) {
      // 高亮当前行动单位
      updateActionOrderDisplay(actionIndex, 'current');
      const el = document.getElementById(action.id);
      if (el) el.classList.add('selected');

      // 处理灼伤印记：行动前受到伤害
      if (action.caster.burnMark && action.caster.currentHp > 0) {
        await delay(200);
        const burnMarkDamage = Math.floor(action.caster.burnMarkPower * (0.8 + Math.random() * 0.4));
        action.caster.currentHp = Math.max(0, action.caster.currentHp - burnMarkDamage);
        showDamageNumber(action.caster.id, burnMarkDamage, 'damage');
        updateHpBar(action.caster);
        addLog(`${action.caster.name} 的「灼伤印记」触发，受到 ${burnMarkDamage} 火属性伤害！`, 'damage');
      }

      await delay(400);

      if (action.type === 'player') {
        // 玩家指令执行
        const targetId = action.targetId;
        const target = [...enemyUnits, ...playerUnits].find(u => u.id === targetId);

        // 检查目标是否有效
        if (!target || target.currentHp <= 0) {
          addLog(`${action.caster.name} 的行动目标无效，跳过`);
          action.command.status = 'skipped';
        }

        if (action.command.status !== 'skipped') {
          await executePlayerCommand(action.caster, action.skill, action.targetId);
        }
      } else {
        // 敌人行动执行
        await executeEnemyAction(action.caster);
      }

      // 清除高亮
      if (el) el.classList.remove('selected');
    }

    // ==================== 战斗流程 ====================

    // 获取当前应该行动的单位
    function getCurrentAction() {
      if (actionQueue.length === 0) return null;
      return actionQueue[currentActionIndex];
    }

    // 获取所有行动单位的行动队列
    function buildActionQueue() {
      const actions = [];

      // 添加所有存活的玩家（无论是否有指令）
      for (const player of playerUnits) {
        if (player.currentHp <= 0) continue;

        // 找到该玩家的指令
        const cmd = playerCommands.find(c => c.casterId === player.id && c.status === 'pending');
        let skill = null;
        if (cmd) {
          skill = player.skills.find(s => s.id === cmd.skillId);
        }

        actions.push({
          id: player.id,
          type: 'player',
          caster: player,
          skill: skill,
          targetId: cmd ? cmd.targetId : null,
          speed: player.speed,
          hasCommand: !!cmd,
          command: cmd
        });
      }

      // 添加所有存活的敌人
      for (const enemy of enemyUnits) {
        if (enemy.currentHp <= 0) continue;
        actions.push({
          id: enemy.id,
          type: 'enemy',
          caster: enemy,
          speed: enemy.speed,
          intent: enemy.intent
        });
      }

      // 按速度排序，同速随机
      actions.sort((a, b) => {
        if (a.speed !== b.speed) return b.speed - a.speed;
        return Math.random() - 0.5;
      });

      return actions;
    }

    // 显示行动顺序预览
    function showActionOrder(queue) {
      const display = document.getElementById('actionOrderDisplay');
      const list = document.getElementById('actionOrderList');

      if (!queue || queue.length === 0) return;

      list.innerHTML = queue.map((action, index) => {
        const isPlayer = action.type === 'player';
        const name = action.caster ? action.caster.name : 'unknown';
        const iconClass = isPlayer ? 'player' : 'enemy';
        const icon = isPlayer ? 'P' : 'E';
        const isExecuted = isPlayer && executedPlayerIds.has(action.caster.id);
        const isMode3 = currentBattleMode === 3;

        return `
          <div class="action-order-item ${isExecuted ? 'executed' : ''}" data-index="${index}">
            <span class="action-order-icon ${iconClass}">${icon}</span>
            <span>${name}</span>
            <span class="action-order-speed">(${action.speed})</span>
            ${isMode3 && isExecuted ? '<span class="action-order-executed">已行动</span>' : ''}
          </div>
        `;
      }).join('');

      display.classList.add('visible');
    }

    // 更新行动顺序显示
    function updateActionOrderDisplay(currentIndex, status = 'current') {
      const items = document.querySelectorAll('.action-order-item');
      items.forEach((item, index) => {
        item.classList.remove('current', 'executed', 'skipped');
        if (index < currentIndex) {
          item.classList.add('executed');
        } else if (index === currentIndex) {
          item.classList.add('current');
        }
      });
    }

    // 隐藏行动顺序显示
    function hideActionOrder() {
      document.getElementById('actionOrderDisplay').classList.remove('visible');
    }

    // 解析目标（根据策略）
    function resolveActionTarget(action) {
      if (action.targetId) {
        const target = [...enemyUnits, ...playerUnits].find(u => u.id === action.targetId);
        if (target && target.currentHp > 0) return target;
      }

      // 需要重新解析目标
      const validTargets = action.skill.target === 'single_enemy' ? enemyUnits : playerUnits;
      return resolveTarget(action.skill, validTargets);
    }

    // 执行单个行动（主要用于敌人）
    async function executeAction(action) {
      // 高亮当前行动单位
      updateActionOrderDisplay(currentActionIndex, 'current');
      const el = document.getElementById(action.id);
      if (el) el.classList.add('selected');

      // 处理灼伤印记：行动前受到伤害
      if (action.caster.burnMark && action.caster.currentHp > 0) {
        await delay(200);
        const burnMarkDamage = Math.floor(action.caster.burnMarkPower * (0.8 + Math.random() * 0.4));
        action.caster.currentHp = Math.max(0, action.caster.currentHp - burnMarkDamage);
        showDamageNumber(action.caster.id, burnMarkDamage, 'damage');
        updateHpBar(action.caster);
        addLog(`${action.caster.name} 的「灼伤印记」触发，受到 ${burnMarkDamage} 火属性伤害！`, 'damage');
      }

      await delay(400);

      // 敌人行动执行
      await executeEnemyAction(action.caster);

      // 清除高亮
      if (el) el.classList.remove('selected');
    }

    // 执行玩家命令
    async function executePlayerCommand(caster, skill, targetId) {
      const target = [...enemyUnits, ...playerUnits].find(u => u.id === targetId);
      if (!target || target.currentHp <= 0) return;

      // 处理休息技能（回复能量）
      if (skill.effect === 'energy_restore') {
        const energyRestore = skill.power || 5;
        const oldEnergy = caster.energy;
        caster.energy = Math.min(caster.energy + energyRestore, MAX_ENERGY);
        const actualRestore = caster.energy - oldEnergy;
        addLog(`${caster.name} 使用 ${skill.name}，回复 ${actualRestore} 点能量（${oldEnergy}→${caster.energy}）`, 'heal');
        return;
      }

      if (skill.target === 'single_enemy') {
        // 攻击技能
        let totalDamage = 0;

        // 检查蓄焰增伤buff（蓄焰是给队友的buff，所以检查target）
        let powerBonus = 0;
        if (target.flameCharge && target.flameChargeTurns > 0 && skill.element === 'fire') {
          powerBonus = target.flameChargePower || (target.energy * 10);
          addLog(`${target.name} 的蓄焰效果生效，火属性攻击威力+${powerBonus}！`, 'buff');
          target.flameCharge = false;
          target.flameChargeTurns = 0;
        }

        // 检查烈火护体下次火攻增伤
        if (target.wallOfFlamesPower > 0 && skill.element === 'fire') {
          powerBonus += target.wallOfFlamesPower;
          addLog(`${target.name} 的烈火护体效果生效，火属性攻击威力+${target.wallOfFlamesPower}！`, 'buff');
          target.wallOfFlamesPower = 0;
        }

        // 检查光能汇聚增伤（草系技能）
        let lightGatherBonus = 0;
        if (caster.lightGatherStacks && caster.lightGatherStacks > 0 && skill.element === 'grass') {
          // 光能爆轰：消耗所有光能汇聚层数
          if (skill.powerPerStack && skill.powerPerStack > 0) {
            lightGatherBonus = caster.lightGatherStacks * skill.powerPerStack;
            addLog(`${caster.name} 消耗 ${caster.lightGatherStacks} 层光能汇聚，草系攻击威力+${lightGatherBonus}！`, 'buff');
            caster.lightGatherStacks = 0;
          } else {
            // 其他草系技能：每次消耗1层光能汇聚
            lightGatherBonus = 60; // 每次草系输出技能+60威力
            addLog(`${caster.name} 的光能汇聚效果生效，草系攻击威力+${lightGatherBonus}！`, 'buff');
            caster.lightGatherStacks -= 1;
          }
        }
        powerBonus += lightGatherBonus;

        // 检查芬芳环境增伤（草系技能）
        if (battleEnvironment === 'fragrant' && skill.element === 'grass') {
          powerBonus += Math.floor(skill.power * 0.25);
          addLog(`芬芳环境影响，草系技能威力+25%！`, 'buff');
        }

        // 雷霆连击：多段攻击
        if (skill.effect === 'combo') {
          const hits = skill.comboHits || 3;
          const powerPerHit = skill.comboPower || Math.floor(skill.power / hits);
          let comboCount = caster.comboCount || 0;

          for (let i = 0; i < hits; i++) {
            // 使用宝可梦公式计算每次攻击伤害
            // 对于多段攻击，每段使用单段威力
            const hitSkill = { ...skill, power: powerPerHit };
            const result = calculatePokemonDamage(caster, target, hitSkill, { powerBonus });
            let hitDamage = result.damage;

            // 检查目标的减伤效果
            if (target.damageReduction && target.damageReduction > 0) {
              hitDamage = Math.floor(hitDamage * (1 - target.damageReduction));
            }

            // 检查目标的护盾
            if (target.shield && target.shield > 0) {
              if (hitDamage > target.shield) {
                hitDamage -= target.shield;
                target.shield = 0;
              } else {
                target.shield -= hitDamage;
                hitDamage = 0;
              }
            }

            totalDamage += hitDamage;
            target.currentHp = Math.max(0, target.currentHp - hitDamage);
            showDamageNumber(target.id, hitDamage, 'damage');

            // 构建日志
            let hitLogMsg = `${caster.name} 使用 ${skill.name}，第${i + 1}段攻击造成 ${hitDamage} 伤害`;
            if (result.isCrit) hitLogMsg += '（暴击！）';
            if (result.typeMultiplier !== 1) hitLogMsg += `【${result.typeMultiplier >= 2 ? '效果拔群' : '效果微弱'}×${result.typeMultiplier}】`;
            if (result.stabBonus !== 1) hitLogMsg += '【STAB】';

            // 水之守护：受到伤害时，攻击者获得1层浸透（多段攻击）
            if (target.buffs?.some(b => b.type === 'aqua_shield')) {
              const aquaShieldBuff = target.buffs.find(b => b.type === 'aqua_shield');
              if (aquaShieldBuff && hitDamage > 0) {
                const existingSoak = caster.debuffs.find(d => d.type === 'water_soak');
                if (existingSoak) {
                  if (existingSoak.stacks < 6) {
                    existingSoak.stacks += 1;
                    existingSoak.remainingDuration = 2;
                  }
                } else {
                  caster.debuffs.push({
                    type: 'water_soak',
                    stacks: 1,
                    power: 1,
                    remainingDuration: 2,
                    maxStacks: 6
                  });
                }
                addLog(`${target.name} 受到「水之守护」反击，${caster.name} 获得1层「浸透」！`, 'debuff');
              }
            }

            // 多段攻击灼烧判定：每次命中独立判定概率灼烧
            if (skill.burnChance && skill.burnChance < 1) {
              // 概率灼烧（如烈焰拳50%概率）
              if (Math.random() < skill.burnChance) {
                const existingBurn = target.debuffs.find(d => d.type === 'burn');
                const burnStacks = skill.burnStacks || 1;
                if (existingBurn) {
                  existingBurn.stacks += burnStacks;
                  existingBurn.remainingDuration = 3;
                } else {
                  target.debuffs.push({
                    type: 'burn',
                    stacks: burnStacks,
                    damagePercentPerStack: 0.02,
                    remainingDuration: 3
                  });
                }
                addLog(`第${i + 1}段攻击命中，${target.name} 陷入灼烧状态！`, 'damage');
              }
            } else if (skill.burnStacks && !skill.burnChance) {
              // 必定灼烧：每段攻击必定附加灼烧层数（如爆炸烈焰每次1层）
              const existingBurn = target.debuffs.find(d => d.type === 'burn');
              if (existingBurn) {
                existingBurn.stacks += skill.burnStacks;
                existingBurn.remainingDuration = 3;
              } else {
                target.debuffs.push({
                  type: 'burn',
                  stacks: skill.burnStacks,
                  damagePercentPerStack: 0.02,
                  remainingDuration: 3
                });
              }
            }

            addLog(hitLogMsg, 'damage');
            await delay(200);
          }

          // 多段攻击结束后的必定灼烧日志（爆炸烈焰等）
          if (skill.burnStacks && !skill.burnChance) {
            const existingBurn = target.debuffs.find(d => d.type === 'burn');
            addLog(`${target.name} 陷入灼烧状态！（${existingBurn ? existingBurn.stacks : skill.burnStacks}层，每层2%最大HP/回合，层数减半）`, 'damage');
          }

          // 25%概率追加额外攻击
          if (Math.random() < (skill.comboChance || 0.25)) {
            const extraSkill = { ...skill, power: powerPerHit };
            const extraResult = calculatePokemonDamage(caster, target, extraSkill, { powerBonus });
            let extraDamage = extraResult.damage;

            // 检查目标的减伤和护盾
            if (target.damageReduction && target.damageReduction > 0) {
              extraDamage = Math.floor(extraDamage * (1 - target.damageReduction));
            }
            if (target.shield && target.shield > 0) {
              if (extraDamage > target.shield) {
                extraDamage -= target.shield;
                target.shield = 0;
              } else {
                target.shield -= extraDamage;
                extraDamage = 0;
              }
            }

            totalDamage += extraDamage;
            target.currentHp = Math.max(0, target.currentHp - extraDamage);
            showDamageNumber(target.id, extraDamage, 'damage');
            addLog(`雷霆连击追加攻击！造成 ${extraDamage} 伤害${extraResult.isCrit ? '（暴击！）' : ''}`, 'damage');
          }

          // 连击充能
          comboCount += hits;
          caster.comboCount = comboCount;
          addLog(`${caster.name} 积累 ${hits} 层连击（总共 ${comboCount} 层）`);

          // 多段攻击总威力统计
          if (skill.comboHits && skill.comboPower) {
            const totalPower = skill.comboHits * skill.comboPower;
            addLog(`${skill.name} 总威力 ${skill.comboPower}×${skill.comboHits} = ${totalPower}，命中率${(skill.burnChance ? skill.burnChance * 100 : 100).toFixed(0)}%`, 'info');
          }

        } else {
          // 普通单次攻击：使用宝可梦伤害公式
          const result = calculatePokemonDamage(caster, target, skill, { powerBonus });

          // 构建日志信息
          let logMsg = `${caster.name} 使用 ${skill.name}，对 ${target.name} 造成 ${result.damage} 伤害`;
          if (result.isCrit) {
            logMsg += '（暴击！）';
          }
          if (result.typeMultiplier !== 1) {
            logMsg += `【${result.typeMultiplier >= 2 ? '效果拔群' : '效果微弱'}×${result.typeMultiplier}】`;
          }
          if (result.stabBonus !== 1) {
            logMsg += '【STAB】';
          }

          let damage = result.damage;

          // 检查目标的减伤效果（技能附带的减伤buff，如火盾）
          if (target.damageReduction && target.damageReduction > 0) {
            const originalDamage = damage;
            damage = Math.floor(damage * (1 - target.damageReduction));
            addLog(`${target.name} 的减伤效果生效，伤害从 ${originalDamage} 降低至 ${damage}`, 'buff');
          }

          // 检查目标的护盾
          if (target.shield && target.shield > 0) {
            if (damage > target.shield) {
              damage -= target.shield;
              addLog(`${target.name} 的护盾吸收了 ${target.shield} 点伤害`);
              target.shield = 0;
            } else {
              target.shield -= damage;
              addLog(`${target.name} 的护盾完全吸收了 ${damage} 点伤害`);
              damage = 0;
            }
          }

          totalDamage = damage;
          target.currentHp = Math.max(0, target.currentHp - damage);
          showDamageNumber(target.id, damage, 'damage');
          addLog(logMsg, 'damage');

          // 水之守护：受到伤害时，攻击者获得1层浸透
          if (target.buffs?.some(b => b.type === 'aqua_shield')) {
            const aquaShieldBuff = target.buffs.find(b => b.type === 'aqua_shield');
            if (aquaShieldBuff && damage > 0) {
              const existingSoak = caster.debuffs.find(d => d.type === 'water_soak');
              if (existingSoak) {
                if (existingSoak.stacks < 6) {
                  existingSoak.stacks += 1;
                  existingSoak.remainingDuration = 2;
                }
              } else {
                caster.debuffs.push({
